    body.append(
      el("button",{class:"btn",onClick:async()=>{ const n=await addMissingToGym(list); close(); render(); toast(`Added ${n} to ${gn}`); }},ic("plus"),`Add to ${gn}`),
      el("button",{class:"btn secondary",style:"margin-top:8px",onClick:close},"Skip for now"));
  });
}
async function addMissingToGym(list){
  let n=0;
  for(const {ex,sets} of list){
    let lid=ex.linkId;                                   // link the new copy to the original so progress pools
    if(!lid){ lid=uid(); ex.linkId=lid; await DB.put("exercises",ex); }
    const copy={...ex, id:uid(), gymId:State.currentGymId, linkId:lid}; delete copy.createdAt;
    await DB.put("exercises",copy); State.exercises.push(copy);
    await addToPlan(copy, sets); n++;
  }
  await persistSession();
  return n;
}

/* ============================================================
   SHEETS (modals)
   ============================================================ */
function openSheet(title, buildBody, opts={}){
  const stacked=!!opts.stacked;                 // stacked: layer over the current sheet instead of replacing it
  const host=$("#sheetHost");
  const bg=el("div",{class:"sheet-bg"}); if(stacked) bg.style.zIndex="55";
  let onKey;
  const close=()=>{ document.removeEventListener("keydown",onKey); if(stacked){ bg.remove(); } else { host.innerHTML=""; document.body.classList.remove("modal-open"); } };
  onKey=e=>{ if(e.key!=="Escape") return; const bgs=document.querySelectorAll(".sheet-bg"); if(bgs.length && bgs[bgs.length-1]===bg) close(); };  // Esc closes the topmost sheet
  document.addEventListener("keydown",onKey);
  bg.addEventListener("click",e=>{ if(e.target===bg) close(); });
  const sheet=el("div",{class:"sheet"});
  sheet.append(el("div",{class:"grabber"}));
  sheet.append(el("div",{class:"sheethead"},
    el("h2",{},title),
    el("button",{class:"sheetclose","aria-label":"Close",onClick:close}, ic("x",20))));
  buildBody(sheet, close);
  bg.append(sheet);
  if(stacked){ document.body.append(bg); }       // keep the sheet underneath (e.g. library detail over the picker)
  else { host.innerHTML=""; host.append(bg); document.body.classList.add("modal-open"); }
  adjustOpenSheets();
}
// Keep an open bottom sheet above the iOS software keyboard. Focusing an input shrinks the
// visual viewport; a position:fixed sheet can't be scrolled by iOS to clear the keyboard, so
// without this the keyboard (and its ^ v Done bar) covers the field and the layout looks broken.
function adjustOpenSheets(){
  const vv=(typeof window!=="undefined") && window.visualViewport; if(!vv) return;
  const overlap=Math.max(0, Math.round(window.innerHeight - vv.height - vv.offsetTop)); // keyboard height (0 when hidden)
  document.querySelectorAll(".sheet-bg .sheet").forEach(sheet=>{
    sheet.style.marginBottom = overlap>0 ? overlap+"px" : "";          // float above the keyboard
    sheet.style.maxHeight    = overlap>0 ? (Math.round(vv.height)-8)+"px" : ""; // shrink to fit; else CSS 88vh
  });
}
if(typeof window!=="undefined" && window.visualViewport){
  visualViewport.addEventListener("resize", adjustOpenSheets);
  visualViewport.addEventListener("scroll", adjustOpenSheets);
}

/* exercise (machine) add/edit */
function muscleSelect(value, includeNone){
  const sel=document.createElement("select");
  if(includeNone){ const o=document.createElement("option"); o.value=""; o.textContent="None"; sel.append(o); }
  REGION_ORDER.forEach(region=>{
    const keys=Object.keys(MUSCLES).filter(k=>MUSCLES[k].region===region);
    if(!keys.length)return;
    const og=document.createElement("optgroup"); og.label=region;
    keys.forEach(k=>{ const o=document.createElement("option"); o.value=k; o.textContent=MUSCLES[k].label; og.append(o); });
    sel.append(og);
  });
  sel.value=value||"";
  return sel;
}
function equipSelect(value){
  const sel=document.createElement("select");
  EQUIP_ORDER.forEach(k=>{ const o=document.createElement("option"); o.value=k; o.textContent=EQUIP[k].label; sel.append(o); });
  sel.value=value||"machine";
  return sel;
}
const REST_OPTS=[30,45,60,75,90,120,150,180,240,300];
function restSelect(value){
  const sel=document.createElement("select");
  REST_OPTS.forEach(s=>{ const o=document.createElement("option"); o.value=s; o.textContent=fmtRest(s); sel.append(o); });
  // snap to the nearest preset if the value isn't already one
  const snapped=REST_OPTS.includes(+value)?+value:REST_OPTS.reduce((a,b)=>Math.abs(b-value)<Math.abs(a-value)?b:a,REST_OPTS[0]);
  sel.value=String(snapped);
  return sel;
}
// togglable gym chips for a machine's "available at"; lockedSet = gyms already in the group (can't remove here)
function gymMultiSelect(preChecked, lockedSet, onChange){

    // gym availability — only for machines/cables, and only worth asking when you have >1 gym

      : [...new Set(linkedIds(ex.id).map(id=>State.exercises.find(e=>e.id===id)?.gymId).filter(Boolean))];

    function updateLinkHint(){

    pSel.addEventListener("change",()=>{ mTouched=true; reSuggestRest(); });
    sSel.addEventListener("change",()=>mTouched=true);
    eqSel.addEventListener("change",()=>{ eqTouched=true; if(!incTouched && unit.value!=="lvl") inc.value=EQUIP[eqSel.value].inc; syncGymUI(); });
    inc.addEventListener("input",()=>incTouched=true);
    unit.addEventListener("change",()=>{ if(!incTouched) inc.value = unit.value==="lvl" ? 1 : EQUIP[eqSel.value].inc; syncUnit(); });
    rmax.addEventListener("input",reSuggestRest);
    restSel.addEventListener("change",()=>restTouched=true);
    body.append(
      el("label",{class:"field"},el("span",{},"Exercise name"),name),
      el("div",{class:"grid2"},
        el("label",{class:"field"},el("span",{},"Equipment"),eqSel),

      el("div",{class:"grid2"},
        el("label",{class:"field"},el("span",{},"Smallest increment"),inc),
        el("label",{class:"field"},el("span",{},"Sets"),sets)),
      el("div",{class:"grid2"},
        el("label",{class:"field"},el("span",{},"Primary muscle"),pSel),
        el("label",{class:"field"},el("span",{},"Secondary (optional)"),sSel)),
      el("div",{class:"tiny muted",style:"margin:-4px 0 10px"},"Equipment & muscles auto-detected from the name — change if needed."),
      el("div",{class:"grid2"},
        el("label",{class:"field"},el("span",{},"Rep min"),rmin),
        el("label",{class:"field"},el("span",{},"Rep max"),rmax)),
      el("label",{class:"field"},el("span",{},"Rest between sets"),restSel),
      el("div",{class:"tiny muted",style:"margin:-4px 0 4px"},"Auto-set from rep range & movement — heavy compounds rest longer, isolation less. Change anytime."),
    );
    syncGymUI(); syncUnit();
    body.append(el("button",{class:"btn",onClick:async()=>{
      if(!name.value.trim())return;
      const equipment=eqSel.value;
      const base={name:name.value.trim(),equipment,unit:unit.value,increment:+inc.value||EQUIP[equipment].inc,
        sets:+sets.value||3,repMin:+rmin.value||8,repMax:+rmax.value||12,
        primary:pSel.value||null, secondary:sSel.value||null, restSec:+restSel.value||suggestRest({name:name.value,repMax:+rmax.value||12,primary:pSel.value}),
        kgPerLevel:(unit.value==="lvl" && +kplInp.value>0)? +kplInp.value : null};
      if(equipGymScoped(equipment)){
        let desired=gms.get(); if(!desired.length) desired=[State.currentGymId];
        const groupRecords = isNew?[]:linkedIds(ex.id).map(id=>State.exercises.find(e=>e.id===id)).filter(Boolean);
        let lid = ex.linkId || (new Set([...groupRecords.map(r=>r.gymId), ...desired]).size>1 ? uid() : null);
        Object.assign(ex, base, {gymId: isNew?desired[0]:ex.gymId, linkId:lid||null});
        await DB.put("exercises",ex);
        for(const r of groupRecords){ if(r.id===ex.id)continue; Object.assign(r, base, {linkId:lid}); await DB.put("exercises",r); }
        const have=new Set([ex.gymId, ...groupRecords.map(r=>r.gymId)]);
        for(const gid of desired){ if(have.has(gid))continue; have.add(gid);
          if(!lid){ lid=uid(); ex.linkId=lid; await DB.put("exercises",ex); }
          const dupe=State.exercises.find(e=>e.gymId===gid && equipGymScoped(e.equipment) && normName(e.name)===normName(base.name));
          if(dupe){ dupe.linkId=lid; await DB.put("exercises",dupe); }
          else await DB.put("exercises",{...base, id:uid(), gymId:gid, linkId:lid});
        }
      } else {
        Object.assign(ex, base, {gymId:null}); delete ex.linkId;
        await DB.put("exercises",ex);
      }
      State.exercises=await DB.all("exercises");
      close();
      if(isNew && opts.onCreate) await opts.onCreate(ex);   // e.g. drop it straight into today's workout
      render();
      if(isNew) maybePromptSameMachine(ex);
      else toast(`Saved “${ex.name}”`);
    }},isNew?"Add exercise":"Save"));
    if(!isNew) body.append(el("button",{class:"btn danger",style:"margin-top:8px",onClick:async()=>{
      if(!confirm(`Delete "${ex.name}"? Logged history stays.`))return;
      await DB.del("exercises",ex.id); State.exercises=await DB.all("exercises"); close(); render();
    }},"Delete exercise"));
  });
}

// touch/mouse drag-to-reorder: rows are direct children of `container`, each with a [data-grip] handle.
// The dragged row follows the finger; the others slide to make room; onReorder(from,to) commits on drop.
function makeSortable(container, onReorder){
  container.querySelectorAll("[data-grip]").forEach(handle=>{
    handle.style.touchAction="none";
    let drag=null;
    handle.addEventListener("pointerdown", e=>{
      e.preventDefault();
      const row=handle.closest("[data-sort]"); if(!row) return;
      const rows=[...container.children], rects=rows.map(r=>r.getBoundingClientRect());
      const from=rows.indexOf(row), step=rows.length>1?(rects[1].top-rects[0].top):rects[0].height;
      drag={rows,rects,from,to:from,step,startY:e.clientY,pid:e.pointerId,row};
      try{ handle.setPointerCapture(e.pointerId); }catch(_){}
      row.style.transition="none"; row.style.position="relative"; row.style.zIndex="5";
      row.style.boxShadow="0 12px 26px -10px rgba(0,0,0,.55)"; row.style.opacity=".97";
    });
    handle.addEventListener("pointermove", e=>{
      if(!drag||drag.pid!==e.pointerId) return;
      const dy=e.clientY-drag.startY;
      drag.row.style.transform=`translateY(${dy}px)`;
      const center=drag.rects[drag.from].top+drag.rects[drag.from].height/2+dy;
      let to=drag.from;
      while(to<drag.rows.length-1 && center>drag.rects[to+1].top+drag.rects[to+1].height/2) to++;
      while(to>0 && center<drag.rects[to-1].top+drag.rects[to-1].height/2) to--;
      if(to!==drag.to){ drag.to=to;
        drag.rows.forEach((r,j)=>{ if(r===drag.row) return;
          let shift=0;
          if(to>drag.from && j>drag.from && j<=to) shift=-drag.step;
          else if(to<drag.from && j<drag.from && j>=to) shift=drag.step;
          r.style.transition="transform .15s ease"; r.style.transform=shift?`translateY(${shift}px)`:"";
        });
      }
    });
    const end=e=>{ if(!drag||drag.pid!==e.pointerId) return;
      const {rows,from,to}=drag; drag=null;
      try{ handle.releasePointerCapture(e.pointerId); }catch(_){}
      rows.forEach(r=>{ r.style.transition=""; r.style.transform=""; r.style.position=""; r.style.zIndex=""; r.style.boxShadow=""; r.style.opacity=""; });
      if(to!==from) onReorder(from,to);
    };
    handle.addEventListener("pointerup", end);
    handle.addEventListener("pointercancel", end);
  });
}
function openPlanSheet(){
  openSheet("Today's plan",(body,close)=>{

    // ---- the plan itself (short list, below the actions) ----

        const tags=muscleTags(ex); if(tags) grow.append(tags);

        listBox.append(el("div",{"data-sort":"1",class:"listitem",style:"cursor:default;gap:4px"},

          el("div",{class:"idx",style:"width:14px;text-align:center;color:var(--muted);flex:none"}, idx+1),
          grow,
          el("button",{class:"sheetclose",style:"width:38px;height:40px;flex:none","aria-label":`Remove ${ex.name} from plan`,onClick:async()=>{

// unified "Add exercise" picker: search across your collection + the full library, browse by body
// part (collapsible), add with one tap; fall back to creating a custom exercise if it's not there.
function openAddExerciseSheet(afterClose){
  openSheet("Add exercise",(body,close)=>{
    const done=()=>{ close(); afterClose&&afterClose(); };
    body.append(el("p",{class:"small muted",style:"margin:-6px 0 8px"},
      "Search or browse by body part. Machines & cables save to ", el("b",{}, curGym()?curGym().name:"this gym"),
      "; free-weight moves are shared across your gyms."));
    const search=el("input",{type:"text",placeholder:"Search all exercises…","aria-label":"Search exercises"});
    body.append(el("div",{style:"margin-bottom:6px"}, search));
    body.append(el("button",{class:"btn secondary",style:"margin:0 0 12px",onClick:done}, ic("check",16), "Done"));
    const results=el("div",{}), foot=el("div",{});
    body.append(results, foot);

    const planned = ()=> new Set(State.activeSession.items.map(i=>i.exerciseId));
    const own = ()=> gymExercises();
    const ownNames = ()=> new Set(own().map(e=>normName(e.name)));
    const CAP=60;

    const removeFromPlan = async exId => { State.activeSession.items = State.activeSession.items.filter(i=>i.exerciseId!==exId); await persistSession(); };
    // a tap-to-add row: tapping adds to the plan right away; the ✕ on an added row removes it
    // (and, for a library exercise added by mistake, deletes the entry it just created).
    function pickRow({name, sub, tags, imgId, imgPromise, planned, onAdd, onRemove}){
      const thumb=el("div",{class:"exthumb"}, ic("dumbbell",18));
      const setImg=id=>{ if(!id)return; const im=document.createElement("img"); im.src=libImageUrl(id,0); im.loading="lazy"; im.alt=""; im.onerror=()=>im.remove(); thumb.append(im); };
      if(imgId) setImg(imgId); else if(imgPromise) imgPromise.then(setImg);
      const grow=el("div",{class:"grow"}, el("div",{class:"name"},name), el("div",{class:"small muted"},sub));
      if(tags) grow.append(tags);
      const slot=el("div",{style:"flex:none;display:flex;align-items:center;gap:2px"});
      const row=el("div",{class:"listitem",role:"button",tabindex:"0",style:"cursor:pointer;gap:10px"});
      let curId=null;
      const showAdd=()=>{ row.dataset.added=""; slot.replaceChildren(el("span",{class:"chip add",style:"min-height:40px;pointer-events:none"}, ic("plus",15),"Add")); };
      const showAdded=()=>{ row.dataset.added="1"; slot.replaceChildren(
        el("span",{class:"tiny muted",style:"display:inline-flex;align-items:center;gap:4px;white-space:nowrap"}, ic("check",15),"Added"),
        el("button",{"aria-label":`Remove ${name}`,style:"flex:none;width:34px;height:40px;display:inline-flex;align-items:center;justify-content:center;background:none;border:none;color:var(--muted);cursor:pointer",
          onClick:async e=>{ e.stopPropagation(); showAdd(); await onRemove(curId); curId=null; }}, ic("x",17))); };
      const add=async()=>{ if(row.dataset.added) return; showAdded(); curId=await onAdd(); };
      row.addEventListener("click", add);
      row.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); add(); } });
      row.append(thumb, grow, slot);
      if(planned){ curId=planned; showAdded(); } else showAdd();   // `planned` is the exId when already in the plan
      return row;
    }
    const ownRow = ex => pickRow({ name:ex.name, sub:(equipLabel(ex.equipment)||"Other")+" · in your collection",
      tags:muscleTags(ex), imgPromise:exerciseImageId(ex), planned: planned().has(ex.id)?ex.id:null,
      onAdd:async()=>{ await addToPlan(ex); toast(`Added ${ex.name}`); return ex.id; },
      onRemove:async()=>{ await removeFromPlan(ex.id); toast(`Removed ${ex.name}`); } });
    const libTags = le => { const t=[]; if(le.primary&&muscleLabel(le.primary)) t.push(muscleTag(muscleLabel(le.primary),regionOf(le.primary),true)); if(le.secondary&&muscleLabel(le.secondary)) t.push(muscleTag(muscleLabel(le.secondary),regionOf(le.secondary),false)); return t.length?el("div",{class:"mtags"},...t):null; };
    const libRow = le => pickRow({ name:le.name, sub:equipLabel(le.equipment)||"Other", tags:libTags(le), imgId:le.raw.id,
      onAdd:async()=>{ const ex=await addLibraryExercise(le.raw); await addToPlan(ex); toast(`Added ${le.name}`); return ex.id; },
      onRemove:async(id)=>{ await removeFromPlan(id); await DB.del("exercises",id); State.exercises=await DB.all("exercises"); toast(`Removed ${le.name} from your exercises`); } });

    function customBtn(){
      const q=search.value.trim();
      return el("button",{class:"btn secondary",style:"margin-top:10px",onClick:()=>{
        close(); openExerciseSheet(null,{prefillName:q, onCreate: async ex=>{ if(!State.activeSession.items.some(i=>i.exerciseId===ex.id)) await addToPlan(ex); afterClose&&afterClose(); }});
      }}, ic("plus",16), q? `Create “${q}” as a custom exercise` : "Create a custom exercise");
    }
    function renderSearch(q){
      results.replaceChildren(); foot.replaceChildren();
      const taken=ownNames();
      const mine=rankByMatch(q, own());
      const libs=rankByMatch(q, (LIB||[]).filter(e=>!taken.has(normName(e.name))));
      if(!mine.length && !libs.length){
        results.append(el("p",{class:"muted small",style:"margin:8px 2px"}, LIB?"Nothing matches — create it as a custom exercise below.":"Loading the library…"));
        if(LIB) foot.append(customBtn());
        return;
      }
      const mineSec=()=>{ results.append(el("div",{class:"regionhead"},"Your exercises")); mine.slice(0,CAP).forEach(e=>results.append(ownRow(e))); };
      const libsSec=()=>{ results.append(el("div",{class:"regionhead"},"From the library")); libs.slice(0,CAP).forEach(e=>results.append(libRow(e))); };
      (libLeadsSearch(q, mine, libs) ? [libs.length&&libsSec, mine.length&&mineSec] : [mine.length&&mineSec, libs.length&&libsSec]).forEach(fn=>fn&&fn());
      foot.append(el("div",{class:"tiny muted",style:"margin:10px 2px 0"},"Not the one you want?"), customBtn());
    }
    function renderGroups(){
      results.replaceChildren(); foot.replaceChildren();
      const taken=ownNames();
      REGION_ORDER.forEach(region=>{
        const mine=sortForAdd(own().filter(e=>exRegion(e)===region));
        const libs=(LIB||[]).filter(e=>e.region===region && !taken.has(normName(e.name)));
        if(!mine.length && !libs.length) return;
        const det=el("details",{class:"exgroup"});
        det.append(el("summary",{}, el("span",{class:"grow",style:"font-weight:600"},region),
          el("span",{class:"tiny muted"}, String(mine.length+libs.length)), el("span",{class:"chev"},ic("chevron",16))));
        let built=false;
        det.addEventListener("toggle",()=>{ if(det.open && !built){ built=true;
          mine.forEach(e=>det.append(ownRow(e)));
          libs.slice(0,CAP).forEach(e=>det.append(libRow(e)));
          if(libs.length>CAP) det.append(el("div",{class:"tiny muted",style:"margin:6px 2px"}, `+${libs.length-CAP} more — type to search them`));
        }});
        results.append(det);
      });
      foot.append(el("div",{class:"tiny muted",style:"margin:12px 2px 0"},"Can't find it?"), customBtn());
    }
    const rerender=()=>{ const q=normName(search.value); q?renderSearch(q):renderGroups(); };
    search.addEventListener("input", rerender);
    rerender();
    loadLibrary().then(rerender).catch(()=>rerender());   // library is a bonus; your collection works regardless
  }, {stacked:true});
}

// parser: "<name> <weight> [x] <r1>[, <r2> ...]"
function parseNL(str){
  if(!str) return null;
  const s=str.trim().replace(/\s+/g," ");
  const m=s.match(/^([a-zA-Z][a-zA-Z\s\-/]*?)\s+(\d+(?:\.\d+)?)\s*(?:x|×|@|for)?\s*([\d,\s]+)$/i);
  if(!m) return null;
  const name=m[1].trim().replace(/\b\w/g,c=>c.toUpperCase());
  const weight=+m[2];
  const reps=m[3].split(/[,\s]+/).map(Number).filter(n=>n>0);
  if(!reps.length) return null;
  return {name,sets:reps.map(r=>({weight,reps:r}))};
}

// week bucket = the Monday of that date (local noon dodges TZ/DST slip)
function mondayOf(iso){ const d=new Date(iso+"T12:00:00"); d.setDate(d.getDate()-((d.getDay()+6)%7)); return d.toISOString().slice(0,10); }
function lastNWeeks(n){ const d=new Date(); d.setHours(12,0,0,0); d.setDate(d.getDate()-((d.getDay()+6)%7)); const out=[]; for(let i=n-1;i>=0;i--){ const w=new Date(d); w.setDate(d.getDate()-i*7); out.push(w.toISOString().slice(0,10)); } return out; }
function weekStreak(weekSet){ const d=new Date(); d.setHours(12,0,0,0); d.setDate(d.getDate()-((d.getDay()+6)%7)); let cur=new Date(d); if(!weekSet.has(cur.toISOString().slice(0,10))) cur.setDate(cur.getDate()-7); let s=0; while(weekSet.has(cur.toISOString().slice(0,10))){ s++; cur.setDate(cur.getDate()-7); } return s; }
function fmtWeekLbl(iso){ const d=new Date(iso+"T12:00:00"); return (d.getMonth()+1)+"/"+d.getDate(); }
// Progressive-overload score (1–10) over the last 28 days. Blends three things, like composite
// indices in other apps (e.g. Jefit's NSPI): how much of your training is moving up (quality),
// how consistently you trained (weeks active), and how big the gains are (magnitude).
// Lifts are pooled by linkId and need ≥2 sessions in the window to count.
function overloadScore(sessions, sets){
  const sesById=Object.fromEntries(sessions.map(s=>[s.id,s])); const unit={}; const weeks=new Set();
  const curWk=lastNWeeks(1)[0];   // exclude the current, incomplete week — a partial week always drags this down
  for(const x of sets){ const ex=State.exercises.find(e=>e.id===x.exerciseId); if(!ex)continue;
    const se=sesById[x.sessionId]; if(!se||daysAgo(se.date)>28||mondayOf(se.date)===curWk)continue;
    weeks.add(mondayOf(se.date));
    // bodyweight lifts: epley(1, reps) = 1+reps/30 puts a rep gain on the same % scale as a load
    // gain on a weighted lift (+1 rep ≈ +3%), so rep-based lifts can't inflate the magnitude term
    const key=ex.linkId||ex.id, m=isBW(ex)?(1+x.reps/30):epley(x.weight,x.reps);
    (unit[key]=unit[key]||{})[se.date]=Math.max(unit[key][se.date]||0, m); }
  let up=0,hold=0,down=0; const gains=[];
  for(const k in unit){ const ks=Object.keys(unit[k]).sort(); if(ks.length<2)continue;
    const f=unit[k][ks[0]], l=unit[k][ks[ks.length-1]], dd=f>0?(l-f)/f:0;
    if(dd>0.01)up++; else if(dd<-0.01)down++; else hold++;
    gains.push(Math.max(-0.2, Math.min(0.2, dd))); }   // clamp per-lift magnitude — small denominators (level 2→3) can't explode the average
  const tracked=up+hold+down;
  if(!tracked) return { score:null, label:"Keep logging", up:0, hold:0, down:0, tracked:0, weeks:Math.min(weeks.size,4), avgGainPct:0 };
  const quality=(up+0.5*hold)/tracked;                    // share moving up (0–1)
  const consistency=Math.min(weeks.size,4)/4;             // weeks trained of last 4 (0–1)
  const avgGain=gains.reduce((a,b)=>a+b,0)/gains.length;  // mean fractional change
  const magnitude=Math.max(0, Math.min(1, avgGain/0.08)); // ~8% over 4 wks = full marks
  const raw=0.5*quality + 0.3*consistency + 0.2*magnitude;
  const score=Math.max(1, Math.min(10, Math.round(raw*10)));
  return { score, up, hold, down, tracked, weeks:Math.min(weeks.size,4), avgGainPct:Math.round(avgGain*100),
    label: score>=8?"Excellent": score>=6?"Progressing": score>=4?"Holding":"Stalling" };
}

      const wk2=mondayOf(se.date); if(!l4.has(wk2)) continue;

    let fq=null;
    for(const mk of Object.keys(fqSets)){

      el("div",{class:"t"},`${muscleLabel(fq.mk)||fq.mk}: all ${Math.round(fq.avgSets)} weekly sets land in one day`),
      el("div",{class:"d"},"Splitting them across two days usually lets you do more quality sets."))); }
    if(!alertCount) alerts.append(el("div",{class:"insight good"},el("div",{class:"t"},"All clear"),
      el("div",{class:"d"},"No plateaus or flags right now. Keep stacking sessions.")));

function sparkline(series,label=""){
  const w=320,h=54,pad=4;
  const min=Math.min(...series),max=Math.max(...series),rng=(max-min)||1;
  const pts=series.map((v,i)=>{
    const x=pad+(series.length<2?w-2*pad:i/(series.length-1)*(w-2*pad));
    const y=h-pad-((v-min)/rng)*(h-2*pad); return `${x.toFixed(1)},${y.toFixed(1)}`;});
  const wrap=el("div",{class:"sparkwrap",role:"img","aria-label":label||"Progress trend"});
  wrap.innerHTML=`<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:100%">
    <polyline fill="none" stroke="var(--data)" stroke-width="2" points="${pts.join(" ")}"/>
    ${pts.length?`<circle cx="${pts[pts.length-1].split(",")[0]}" cy="${pts[pts.length-1].split(",")[1]}" r="3" fill="var(--data)"/>`:""}
  </svg>`;
  return wrap;
}

// a filled line chart (SVG, responsive). values = numbers; opts.labels = x-axis labels
function lineChart(values, opts={}){
  const {labels=[], fmt=(v=>String(Math.round(v)))}=opts;
  const n=values.length, W=324,H=132,padL=6,padR=6,padT=14,padB=18;
  if(!n || values.every(v=>!v)) return el("div",{class:"tiny muted",style:"padding:20px 0;text-align:center"},"Not enough data yet — keep logging.");
  const max=Math.max(...values), min=Math.min(...values,0), rng=(max-min)||1;
  const X=i=> padL + (n<2?(W-padL-padR)/2 : i/(n-1)*(W-padL-padR));
  const Y=v=> padT + (1-(v-min)/rng)*(H-padT-padB);
  const line=values.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
  const li=n-1, base=(H-padB).toFixed(1);
  const fillPts=`${X(0).toFixed(1)},${base} ${line} ${X(li).toFixed(1)},${base}`;
  let xl=""; if(labels.length===n){ [0,Math.floor(li/2),li].forEach(i=>{ const a=i===0?"start":i===li?"end":"middle"; xl+=`<text x="${X(i).toFixed(1)}" y="${H-5}" fill="var(--muted)" font-size="9" text-anchor="${a}">${esc(labels[i])}</text>`; }); }
  const wrap=el("div",{class:"chart",role:"img","aria-label":"Trend chart"});
  wrap.innerHTML=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
    <line x1="${padL}" y1="${base}" x2="${W-padR}" y2="${base}" stroke="var(--line)"/>
    <polygon points="${fillPts}" fill="var(--data)" opacity="0.10"/>
    <polyline points="${line}" fill="none" stroke="var(--data)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${X(li).toFixed(1)}" cy="${Y(values[li]).toFixed(1)}" r="3.5" fill="var(--data)"/>
    <text x="${padL}" y="${(padT-3).toFixed(1)}" fill="var(--muted)" font-size="9">${esc(fmt(max))}</text>
    ${xl}
  </svg>`;
  return wrap;
}

// committed sets for an exercise (pooled across linked machines), each stamped with its session date
async function exerciseHistory(exId){
  let sets=[]; for(const id of linkedIds(exId)) sets=sets.concat(await DB.byIndex("sets","exerciseId",id));
  const by=Object.fromEntries((await DB.all("sessions")).map(s=>[s.id,s]));
  return sets.filter(s=>by[s.sessionId]).map(s=>({...s,date:by[s.sessionId].date})).sort((a,b)=>a.date.localeCompare(b.date));
}
function computePRs(sets, ex){
  const bw=isBW(ex); let heaviest=0,best1rm=0,bestSetVol=0,maxReps=0; const repMax={},bySession={};
  for(const s of sets){ if(!(s.reps>0))continue; const w=+s.weight||0;
    heaviest=Math.max(heaviest,w); maxReps=Math.max(maxReps,s.reps);
    if(!bw) best1rm=Math.max(best1rm,epley(w,s.reps));
    bestSetVol=Math.max(bestSetVol,w*s.reps);
    if(!repMax[s.reps]||w>repMax[s.reps]) repMax[s.reps]=w;
    bySession[s.sessionId]=(bySession[s.sessionId]||0)+w*s.reps; }
  return {heaviest,best1rm:Math.round(best1rm),bestSetVol:Math.round(bestSetVol),
    bestSessionVol:Math.round(Math.max(0,...Object.values(bySession),0)),maxReps,repMax,bw};
}
/* ---- strength standards (rough bands) ----
   e1RM as a multiple of bodyweight, strengthlevel.com-style values, per movement family.
   Bands: Beginner / Novice / Intermediate / Advanced / Elite. Kept in one block so the

const STANDARD_BANDS=["Beginner","Novice","Intermediate","Advanced","Elite"];
const STANDARDS={
  bench:    {m:[0.50,0.75,1.00,1.50,2.00], f:[0.35,0.50,0.75,1.00,1.40]},
  squat:    {m:[0.75,1.25,1.50,2.25,2.75], f:[0.50,0.75,1.25,1.50,2.00]},
  deadlift: {m:[1.00,1.50,2.00,2.50,3.00], f:[0.50,1.00,1.25,1.75,2.50]},

function standardFamily(name){ const n=" "+normName(name)+" ";
  if(/overhead press|shoulder press|military|\bohp\b/.test(n)) return "ohp";
  if(/bench/.test(n)) return "bench";
  if(/deadlift/.test(n)) return "deadlift";

// ordinary least squares over [{x,y}] → {slope, intercept, r2}, or null if degenerate
function olsFit(points){
  const n=points.length; if(n<2) return null;
  let sx=0,sy=0,sxx=0,sxy=0,syy=0;
  for(const p of points){ sx+=p.x; sy+=p.y; sxx+=p.x*p.x; sxy+=p.x*p.y; syy+=p.y*p.y; }
  const denom=n*sxx-sx*sx; if(!denom) return null;
  const slope=(n*sxy-sx*sy)/denom, intercept=(sy-slope*sx)/n;
  const varY=n*syy-sy*sy;
  const r2 = varY ? Math.pow(n*sxy-sx*sy,2)/(denom*varY) : 0;
  return {slope, intercept, r2};
}
// returns a PR message if (weight,reps) beats committed history for this exercise, else null
async function prCheck(ex,weight,reps){
  if(!ex||!(reps>0))return null; const hist=await exerciseHistory(ex.id); if(!hist.length)return null;
  const pr=computePRs(hist,ex);
  if(isBW(ex)) return reps>pr.maxReps? `New PR · ${reps} reps on ${ex.name}` : null;
  if(epley(weight,reps)>pr.best1rm) return `New PR · best est. 1RM on ${ex.name}`;
  if(weight>pr.heaviest) return `New PR · heaviest ${ex.name} (${weight}${ex.unit||"kg"})`;
  return null;
}

  chest:"chest", forearms:"forearms", glutes:"glutes", hamstrings:"hamstrings", lats:"lats",
  "lower back":"lower_back", "middle back":"upper_back", neck:"upper_back", quadriceps:"quads",
  shoulders:"front_delts", traps:"upper_back", triceps:"triceps",

  kettlebells:"kettlebell", bands:"other", "medicine ball":"other", "exercise ball":"bodyweight",

// best-guess library match for an unlinked exercise (token overlap + equipment), as a SUGGESTION the user confirms
function guessLibMatch(ex){
  if(!LIB || !ex) return null;
  const t=normName(ex.name); if(!t) return null;
  const toks=t.split(" ").filter(w=>w.length>2); if(!toks.length) return null;
  let best=null, bestScore=-1;
  for(const e of LIB){
    const nt=new Set(normName(e.name).split(" "));
    const overlap=toks.filter(w=>nt.has(w)).length; if(!overlap) continue;
    let score = overlap/toks.length;                       // fraction of the user's words found
    if(e.equipment===ex.equipment) score += 0.15;          // prefer the same equipment family
    score -= normName(e.name).split(" ").length*0.01;      // mild nudge toward the simpler name
    if(score>bestScore){ bestScore=score; best=e; }
  }
  return bestScore>=0.6 ? best : null;                      // only suggest a reasonably strong match
}

}

async function exportData(kind){
  const [gyms,exercises,sessions,sets,meta]=await Promise.all(
    ["gyms","exercises","sessions","sets","meta"].map(s=>DB.all(s)));
  let blob,fname;
  if(kind==="json"){
    const metaOut=meta.filter(m=>m.k!=="activeSession");   // settings & progression streaks, minus the transient session
    blob=new Blob([JSON.stringify({app:"nextset",version:APP_VERSION,gyms,exercises,sessions,sets,meta:metaOut},null,2)],{type:"application/json"});
    fname="nextset-export.json";
  } else {
    const exName=id=>exercises.find(e=>e.id===id)?.name||"";
    const gName=id=>gyms.find(g=>g.id===id)?.name||"";
    const sesById=Object.fromEntries(sessions.map(s=>[s.id,s]));
    const rows=[["date","gym","exercise","set","weight","reps","rpe","joint"]];
    sets.sort((a,b)=>{const A=sesById[a.sessionId],B=sesById[b.sessionId];
      return ((B?.date||"")+'').localeCompare((A?.date||""))||a.order-b.order;});
    sets.forEach(x=>{const se=sesById[x.sessionId];
      rows.push([se?.date||"",gName(se?.gymId),exName(x.exerciseId),x.order+1,x.weight,x.reps,x.rpe||"",x.joint?"yes":""]);});
    blob=new Blob([rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n")],{type:"text/csv"});
    fname="nextset-sets.csv";
  }
  const url=URL.createObjectURL(blob);
  const a=el("a",{href:url,download:fname}); document.body.append(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast("Exported "+fname);
}

/* ---------- import / restore from a backup ---------- */
const IMPORT_STORES=["gyms","exercises","sessions","sets"];
function isValidBackup(d){ return !!d && typeof d==="object" && IMPORT_STORES.every(s=>Array.isArray(d[s])); }
// write a backup into the DB. "replace" wipes the core stores first; "merge" upserts by id.
async function applyImport(data, mode){
  if(mode==="replace"){
    for(const s of IMPORT_STORES){ for(const r of await DB.all(s)){ if(r&&r.id!=null) await DB.del(s, r.id); } }
  }
  const counts={};
  for(const s of IMPORT_STORES){
    let n=0; for(const r of (data[s]||[])){ if(r&&r.id!=null){ await DB.put(s, r); n++; } }
    counts[s]=n;
  }
  if(Array.isArray(data.meta)){ for(const m of data.meta){ if(m&&m.k&&m.k!=="activeSession") await DB.put("meta", m); } }
  return counts;
}
async function runImport(data, mode){
  await applyImport(data, mode);
  State.activeSession=null; await setMeta("activeSession", null);          // never resume a session across a restore
  _exStatus=null;
  await loadState();
  if(!State.gyms.find(g=>g.id===State.currentGymId)){ State.currentGymId=State.gyms[0]?.id||null; await setMeta("currentGymId", State.currentGymId); }
  render();
  toast(`Restored ${data.sessions.length} workout${data.sessions.length!==1?"s":""}`);
}
function openImportConfirm(data){
  const f=(n,one)=>`${n} ${n===1?one:one+"s"}`;
  const summary=`${f(data.gyms.length,"gym")}, ${f(data.exercises.length,"exercise")}, ${f(data.sessions.length,"workout")}, ${data.sets.length} sets`;
  openSheet("Restore backup",(body,close)=>{
    body.append(
      el("p",{class:"small",style:"margin:-2px 0 4px;font-weight:600"},`This backup holds ${summary}.`),
      el("p",{class:"small muted"},"Merge keeps what's on this device and adds anything new (matching entries get updated — nothing is deleted). Replace erases everything here first, then loads the backup — use that when restoring onto a fresh install."),
      el("button",{class:"btn",style:"margin-top:10px",onClick:async()=>{ close(); try{ await runImport(data,"merge"); }catch(e){ alert("Import failed: "+(e.message||e)); } }},ic("inbox",16),"Merge with my data"),
      el("button",{class:"btn danger",style:"margin-top:10px",onClick:async()=>{ if(!confirm("Replace ALL data on this device with the backup? Anything currently here will be erased.")) return; close(); try{ await runImport(data,"replace"); }catch(e){ alert("Import failed: "+(e.message||e)); } }},ic("alert",16),"Replace everything"),
      el("button",{class:"btn secondary",style:"margin-top:10px",onClick:close},"Cancel")
    );
  });
}
function importDataFromFile(){
  const inp=el("input",{type:"file",accept:"application/json,.json",style:"position:fixed;left:-9999px"});
  document.body.append(inp);
  inp.addEventListener("change", async ()=>{
    const file=inp.files&&inp.files[0]; inp.remove();
    if(!file) return;
    let data;
    try{ data=JSON.parse(await file.text()); }
    catch(e){ alert("Couldn't read that file. Pick a NextSet backup — the .json from Export everything."); return; }
    if(!isValidBackup(data)){ alert("That doesn't look like a NextSet backup. Use a file from More → Your data → Export everything."); return; }
    openImportConfirm(data);
  });
  inp.click();
}

/* ---------- wire up + boot ---------- */
document.querySelectorAll(".tabbar button").forEach(b=>b.addEventListener("click",()=>setTab(b.dataset.tab)));
$("#gymPick").addEventListener("click",openGymSheet);

let swUpdateTriggered=false;
function showUpdateBanner(reg){
  if(document.getElementById("updateBar")) return;
  const bar=el("div",{class:"updatebar",id:"updateBar"},
    el("div",{class:"t"},"New version available"),
    el("button",{onClick:()=>{ swUpdateTriggered=true; const w=reg.waiting||reg.installing; if(w) w.postMessage("SKIP_WAITING"); bar.remove(); }},"Update"));
  document.body.append(bar);
}
// manual escape hatch — forces a fresh network check for sw.js and applies any new version
async function checkForUpdates(){
  if(!("serviceWorker" in navigator) || !location.protocol.startsWith("http")){ toast("Updates aren't available here"); return; }
  const reg = await navigator.serviceWorker.getRegistration();
  if(!reg){ toast("Reopen the app to enable updates"); return; }
  toast("Checking for updates…");
  try{ await reg.update(); }catch(e){}
  const apply=()=>{ if(reg.waiting){ swUpdateTriggered=true; reg.waiting.postMessage("SKIP_WAITING"); toast("Updating…"); return true; } return false; };
  if(apply()) return;
  if(reg.installing){ toast("Downloading new version…"); reg.installing.addEventListener("statechange",()=>apply()); return; }
  toast(`You're on the latest (${APP_VERSION})`);
}

(async function boot(){
  applyTheme();
  try{ if(window.matchMedia) matchMedia("(prefers-color-scheme: light)").addEventListener("change",()=>{ if(getTheme()==="system"){ applyTheme(); render(); } }); }catch(e){}
  try{ await DB.open(); await loadState(); render(); }
  catch(e){ $("#view").innerHTML="<div class='empty'><div class='big'><svg viewBox='0 0 24 24' width='42' height='42' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z'/><path d='M12 9v4'/><path d='M12 17h.01'/></svg></div><p>Couldn't open local storage.</p><p class='muted small'>"+esc(e.message||e)+"</p></div>"; }
  if("serviceWorker" in navigator && location.protocol.startsWith("http")){
    // updateViaCache:"none" → the sw.js script is never served from the HTTP cache on update
    // checks, so a new deploy is detected immediately (iOS caches it for 10 min otherwise).
    navigator.serviceWorker.register("sw.js", {updateViaCache:"none"}).then(reg=>{
      reg.update().catch(()=>{});   // force a check on every launch (iOS often skips the automatic one)
      if(reg.waiting && navigator.serviceWorker.controller) showUpdateBanner(reg);
      reg.addEventListener("updatefound",()=>{
        const nw=reg.installing; if(!nw) return;
        nw.addEventListener("statechange",()=>{
          if(nw.state==="installed" && navigator.serviceWorker.controller) showUpdateBanner(reg);
        });
      });
    }).catch(()=>{});
    let refreshing=false;
    navigator.serviceWorker.addEventListener("controllerchange",()=>{
      if(swUpdateTriggered && !refreshing){ refreshing=true; location.reload(); }
    });
    // re-check whenever the app is brought back to the foreground — a home-screen PWA resumed
    // from memory never re-navigates, so this is often the only time iOS will see a new version.
    document.addEventListener("visibilitychange",()=>{
      if(document.visibilityState==="visible") navigator.serviceWorker.getRegistration().then(r=>r&&r.update()).catch(()=>{});
    });
  }
})();
</script>
