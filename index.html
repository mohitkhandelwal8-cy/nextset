<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#111827" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>NextSet</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#111827; --surface:#1F2937; --surface-2:#2D3A4D; --line:#3A4658;
    --text:#F8FAFC; --muted:#9FB0C3; --accent:#F97316; --on-accent:#0F172A;
    --accent-2:#22C55E; --on-accent-2:#06231A; --warn:#FBBF24; --danger:#F87171;
    --bar-bg:rgba(11,14,20,.86); --tab-bg:rgba(20,25,37,.95);
    --radius:14px; --safe-b:env(safe-area-inset-bottom,0px);
  }
  :root[data-theme="light"]{
    --bg:#F4F6F9; --surface:#FFFFFF; --surface-2:#EAEEF3; --line:#D6DCE5;
    --text:#0F172A; --muted:#5B6878; --accent:#E2620C; --on-accent:#FFFFFF;
    --accent-2:#15803D; --on-accent-2:#FFFFFF; --warn:#B45309; --danger:#DC2626;
    --bar-bg:rgba(244,246,249,.85); --tab-bg:rgba(255,255,255,.95);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:'Barlow',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.5;overscroll-behavior-y:none;font-variant-numeric:tabular-nums}
  h1,h2,.cond,.name,.idx{font-family:'Barlow Condensed','Barlow',sans-serif;letter-spacing:.2px}
  button,input,select,textarea{font-family:inherit;font-size:16px;color:inherit}
  button,a,.listitem,input,select,textarea{touch-action:manipulation}
  button{cursor:pointer;border:none;background:none}
  button:focus-visible,a:focus-visible,[role=button]:focus-visible,
  input:focus-visible,select:focus-visible,textarea:focus-visible{
    outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
  .ic{display:inline-flex;align-items:center;justify-content:center;flex:none}
  .ic svg{display:block}
  .app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  header.topbar{position:sticky;top:0;z-index:20;background:var(--bar-bg);
    backdrop-filter:saturate(160%) blur(12px);border-bottom:1px solid var(--line);
    padding:14px 16px calc(12px);display:flex;align-items:center;gap:10px;padding-top:max(14px,env(safe-area-inset-top))}
  .topbar h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.2px;flex:1}
  .topbar .gympick{font-size:13px;color:var(--muted);background:var(--surface-2);
    border:1px solid var(--line);padding:6px 10px;border-radius:999px;max-width:50%;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  main{flex:1;padding:14px 16px calc(96px + var(--safe-b))}
  .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;
    background:var(--tab-bg);backdrop-filter:blur(12px);border-top:1px solid var(--line);
    padding-bottom:var(--safe-b);max-width:560px;margin:0 auto}
  .tabbar button{flex:1;padding:10px 4px 8px;color:var(--muted);font-size:11px;
    display:flex;flex-direction:column;align-items:center;gap:3px}
  .tabbar button .ic{line-height:0}
  .topbar .brand{display:flex;align-items:center;gap:8px}
  .topbar .brand .ic{color:var(--accent)}
  .tabbar button.active{color:var(--accent)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:12px}
  .card h2{font-size:15px;margin:0 0 10px;font-weight:700}
  .row{display:flex;align-items:center;gap:10px}
  .between{justify-content:space-between}
  .muted{color:var(--muted)}.small{font-size:13px}.tiny{font-size:11px}
  .pill{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--surface-2);
    border:1px solid var(--line);color:var(--muted)}
  .btn{background:var(--accent);color:var(--on-accent);border-radius:12px;padding:13px 16px;
    font-weight:700;width:100%;min-height:48px;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn.secondary{background:var(--surface-2);border:1px solid var(--line);color:var(--text)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
  .btn.danger{background:transparent;border:1px solid var(--danger);color:var(--danger)}
  .btn:active{transform:scale(.98)}
  .btn.sm{padding:9px 12px;width:auto;font-size:14px;border-radius:10px;min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
  input[type=text],input[type=number],select,textarea{width:100%;background:var(--surface-2);
    border:1px solid var(--line);border-radius:10px;padding:11px 12px;color:var(--text);outline:none;line-height:normal}
  input[type=text],input[type=number]{height:46px;-webkit-appearance:none;appearance:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  label.field{display:block;margin-bottom:10px}
  label.field span{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .empty{text-align:center;color:var(--muted);padding:40px 16px}
  .empty .big{margin-bottom:10px;display:flex;justify-content:center;color:var(--muted)}
  .empty .big svg{width:42px;height:42px}
  .listitem{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--surface);
    border:1px solid var(--line);border-radius:12px;margin-bottom:8px;cursor:pointer;width:100%;text-align:left}
  .listitem .grow{flex:1;min-width:0}
  .listitem .name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chev{color:var(--muted)}
  /* set logger */
  .setrow{display:grid;grid-template-columns:26px 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px}
  .setrow .idx{color:var(--muted);font-size:13px;text-align:center}
  .stepper{display:flex;align-items:center;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .stepper button{width:46px;height:46px;font-size:22px;color:var(--accent);font-weight:700;display:flex;align-items:center;justify-content:center}
  .stepper input{height:46px;border:none;background:transparent;text-align:center;padding:0;border-radius:0;-moz-appearance:textfield}
  .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .stepper .unit{font-size:10px;color:var(--muted);padding-right:6px}
  .setrow .done{width:42px;height:44px;border-radius:10px;background:var(--surface-2);
    border:1px solid var(--line);font-size:18px;display:flex;align-items:center;justify-content:center}
  .setrow .done.on{background:var(--accent-2);border-color:var(--accent-2);color:#06231a}
  .suggestion{font-size:12px;color:var(--accent-2);background:rgba(57,217,138,.08);
    border:1px solid rgba(57,217,138,.25);border-radius:10px;padding:8px 10px;margin-bottom:10px}
  .suggestion.warn{color:var(--warn);background:rgba(255,180,84,.08);border-color:rgba(255,180,84,.25)}
  .jointbtn{font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:10px;padding:6px 12px;min-height:44px;display:inline-flex;align-items:center;gap:6px;background:var(--surface-2)}
  .jointbtn.on{color:var(--warn);border-color:var(--warn)}
  .rpe{display:flex;gap:6px;margin-top:6px}
  .rpe button{flex:1;font-size:12px;padding:6px 4px;min-height:44px;border-radius:10px;background:var(--surface-2);border:1px solid var(--line);color:var(--muted);display:inline-flex;align-items:center;justify-content:center;gap:5px}
  .rpe button.on{background:var(--surface-2);border-color:var(--accent);color:var(--accent)}
  /* modal/sheet */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:flex;align-items:flex-end;justify-content:center;touch-action:none}
  body.modal-open{overflow:hidden}
  .sheet{background:var(--surface);width:100%;max-width:560px;border-radius:18px 18px 0 0;
    border-top:1px solid var(--line);padding:18px 16px calc(20px + var(--safe-b));max-height:88vh;overflow:auto;overscroll-behavior:contain;touch-action:auto;animation:up .2s ease}
  @keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:none;opacity:1}}
  .sheet h2{margin:0;font-size:17px}
  .grabber{width:40px;height:4px;border-radius:999px;background:var(--line);margin:2px auto 14px}
  .sheethead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
  .sheetclose{width:44px;height:44px;border-radius:999px;background:var(--surface-2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--muted);flex:none}
  .toast{position:fixed;bottom:calc(86px + var(--safe-b));left:50%;transform:translateX(-50%);
    background:var(--surface-2);border:1px solid var(--line);color:var(--text);padding:10px 16px;
    border-radius:999px;font-size:13px;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:up .2s}
  .sparkwrap{height:60px;width:100%}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:8px 14px;min-height:44px;border-radius:999px;
    background:var(--surface-2);border:1px solid var(--line);color:var(--text);margin:0 6px 8px 0}
  .chip.add{border-style:dashed;color:var(--accent)}
  .insight{border-left:3px solid var(--accent);padding:8px 0 8px 12px;margin-bottom:12px}
  .insight.good{border-color:var(--accent-2)} .insight.warn{border-color:var(--warn)}
  .insight .t{font-weight:600;font-size:14px} .insight .d{font-size:13px;color:var(--muted)}
  .divider{height:1px;background:var(--line);margin:12px 0}
  .hidden{display:none!important}
  a{color:var(--accent)}
  .mtags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
  .mtag{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:999px;
    background:var(--surface-2);border:1px solid var(--line);color:var(--muted);white-space:nowrap}
  .mtag.primary{color:var(--accent);border-color:rgba(249,115,22,.45)}
  .regionhead{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin:16px 4px 8px}
  .regionhead:first-child{margin-top:4px}
  /* top-level section title — one step above .regionhead sub-labels */
  .sectionhead{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.01em;margin:20px 2px 10px}
  .sectionhead:first-child{margin-top:2px}
  .vbar{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .vbar .lbl{width:90px;font-size:13px;flex:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .vbar .track{flex:1;height:8px;background:var(--surface-2);border-radius:999px;overflow:hidden}
  .vbar .fill{height:100%;background:var(--accent);border-radius:999px;min-width:3px}
  .vbar .val{width:30px;text-align:right;font-size:12px;color:var(--muted);flex:none}
  .filterchips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:6px;-webkit-overflow-scrolling:touch}
  .fchip{flex:none;font-size:13px;padding:7px 13px;min-height:40px;border-radius:999px;background:var(--surface-2);
    border:1px solid var(--line);color:var(--muted);display:inline-flex;align-items:center}
  .fchip.on{color:var(--on-accent);background:var(--accent);border-color:var(--accent);font-weight:600}
  /* exercise demo photos (free-exercise-db) */
  .exthumb{position:relative;width:46px;height:46px;flex:none;border-radius:8px;overflow:hidden;background:var(--surface-2);display:flex;align-items:center;justify-content:center}
  .exthumb .ic{position:absolute;color:var(--muted);opacity:.45}
  .exthumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:var(--surface-2)}
  .exthumb[role=button]{cursor:zoom-in}
  .exshots{display:flex;gap:8px;margin:0 0 14px}
  .exshot{flex:1;min-width:0;position:relative;aspect-ratio:1/1;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--surface-2);cursor:zoom-in}
  .exshot img{width:100%;height:100%;object-fit:contain;display:block}
  .exshot-zoom{position:absolute;right:6px;bottom:6px;width:26px;height:26px;border-radius:8px;background:rgba(0,0,0,.55);color:#fff;display:flex;align-items:center;justify-content:center}
  /* full-screen photo viewer */
  .lightbox{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.97);overflow-y:auto;overscroll-behavior:contain;
    padding:max(12px,env(safe-area-inset-top)) 14px calc(16px + var(--safe-b));animation:fade .15s ease}
  .lightbox .lbhead{position:sticky;top:0;z-index:1;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:space-between;gap:10px;color:#fff;padding:6px 0 12px}
  .lightbox .lbhead .name{font-weight:700;font-size:16px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lightbox .lbclose{flex:none;width:40px;height:40px;border-radius:999px;background:rgba(255,255,255,.16);color:#fff;display:flex;align-items:center;justify-content:center}
  .lightbox figure{margin:0 0 16px}
  .lightbox figcaption{color:rgba(255,255,255,.65);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin:0 2px 6px}
  .lightbox img{width:100%;border-radius:14px;background:var(--surface-2);display:block}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .steps{margin:8px 0 4px;padding-left:22px}
  .steps li{margin-bottom:9px;font-size:14px;line-height:1.55;color:var(--text)}
  .steps li::marker{color:var(--accent);font-weight:700}
  /* tappable exercise name (opens the detail sheet) — used wherever an exercise is listed */
  .exlink{display:inline-flex;align-items:center;gap:5px;cursor:pointer;font-weight:600;min-width:0;max-width:100%}
  .exlink .exlink-t{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .exlink .ic{color:var(--muted);flex:none}
  .exlink:active{opacity:.6}
  /* collapsible "How to do it" guide */
  .howto{border:1px solid var(--line);border-radius:12px;margin:8px 0 4px;overflow:hidden}
  .howto>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:8px;padding:12px 14px;font-weight:700;font-size:14px;min-height:44px}
  .howto>summary::-webkit-details-marker{display:none}
  .howto>summary .grow{flex:1}
  .howto>summary .chev{flex:none;color:var(--muted);transition:transform .15s}
  .howto[open]>summary .chev{transform:rotate(90deg)}
  .howto .steps{margin:0;padding:0 16px 12px 34px}
  /* "last time" recall callout in the logger — set-by-set chips on an accent rail */
  .lasttime{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin:12px 0 16px;padding:9px 11px;background:var(--surface-2);border-radius:12px;border-left:3px solid var(--accent)}
  .lasttime .lbl{font-weight:800;color:var(--accent);font-size:10px;text-transform:uppercase;letter-spacing:.6px;flex:none;margin-right:2px}
  .lt-set{font-size:12.5px;font-weight:600;color:var(--text);background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:3px 8px 3px 4px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .lt-set b{font-size:10px;font-weight:800;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);border-radius:5px;min-width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;flex:none}
  /* demoted "tweaked a joint?" toggle */
  .jointtoggle{margin-top:10px;font-size:12px;color:var(--muted);background:none;border:none;display:inline-flex;align-items:center;gap:6px;padding:4px 0;min-height:36px;cursor:pointer}
  .jointtoggle.on{color:var(--warn);font-weight:600}
  /* status tags on add-to-plan cards */
  .stag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;display:inline-flex;align-items:center;gap:3px;text-transform:uppercase;letter-spacing:.4px}
  .stag.new{color:var(--muted);background:var(--surface-2);border:1px solid var(--line)}
  .stag.prog{color:var(--accent-2);background:rgba(21,128,61,.12);border:1px solid rgba(21,128,61,.32)}
  .stag.fav{color:#B7791F;background:rgba(245,158,11,.14);border:1px solid rgba(245,158,11,.36)}
  .addtags{margin-top:6px}
  /* favorite toggle in the exercise detail */
  .starbtn{flex:none;background:none;border:none;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;cursor:pointer;border-radius:10px}
  .starbtn.on{color:#F59E0B}
  /* prominent workout-status card (ready-to-start / in-progress) — stands off the page */
  .statuscard{background:var(--surface);border:2px solid var(--accent);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 10px 26px -12px rgba(0,0,0,.32)}
  .statuscard-eyebrow{font-size:11px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
  .updatebar{position:fixed;left:12px;right:12px;bottom:calc(82px + var(--safe-b));max-width:536px;margin:0 auto;z-index:45;
    background:var(--surface-2);border:1px solid var(--accent);border-radius:12px;padding:10px 12px;
    display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.45)}
  .updatebar .t{flex:1;font-size:13px}
  .updatebar button{background:var(--accent);color:var(--on-accent);border-radius:9px;padding:9px 14px;font-weight:700;font-size:13px;min-height:40px}
  /* plan editor: set-count stepper + reorder arrows */
  .setstep{display:flex;align-items:center;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;overflow:hidden;flex:none}
  .setstep button{width:32px;height:42px;color:var(--accent);font-size:19px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .setstep .setlbl{min-width:40px;text-align:center;font-size:10px;color:var(--muted);line-height:1.1;padding:0 2px}
  .setstep .setlbl strong{display:block;font-size:15px;color:var(--text);font-weight:700}
  .miniarrow{width:28px;height:20px;border:1px solid var(--line);border-radius:6px;background:var(--surface-2);color:var(--muted);font-size:8px;display:flex;align-items:center;justify-content:center}
  .miniarrow:disabled{opacity:.3}
  .progpill{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .progpill.up{color:var(--accent-2);background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.4)}
  .progpill.down{color:var(--warn);background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.35)}
  .progpill.hold{color:var(--muted);background:var(--surface-2);border:1px solid var(--line)}
  /* in-workout exercise states */
  .card.current{border-color:var(--accent);box-shadow:0 0 0 2px rgba(249,115,22,.22)}
  .card.done{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.05)}
  .nowtag{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--on-accent);background:var(--accent);padding:2px 7px;border-radius:999px}
  .ssgroup{border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:14px;padding:10px;margin-bottom:12px;background:rgba(249,115,22,.04)}
  .ssgroup .card{margin-bottom:10px} .ssgroup .card:last-child{margin-bottom:0}
  .sshead{display:flex;align-items:center;gap:8px;margin:2px 2px 10px}
  .ssbadge{font-size:11px;font-weight:700;color:var(--accent);background:rgba(249,115,22,.14);border:1px solid rgba(249,115,22,.4);padding:2px 8px;border-radius:999px;white-space:nowrap}
  .setrow.drop{margin-left:20px}
  .setrow.drop .idx{color:var(--warn);font-weight:700}
  .donecheck{width:26px;height:26px;border-radius:999px;background:var(--accent-2);color:var(--on-accent-2);display:flex;align-items:center;justify-content:center;flex:none}
  .stepper.locked{opacity:.55;background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.3)}
  .stepper.locked button{color:var(--muted)}
  .stepper.locked input{color:var(--muted)}
  /* insights */
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:12px 13px}
  .stat .num{font-family:'Barlow Condensed','Barlow',sans-serif;font-size:27px;font-weight:700;line-height:1.05}
  .stat .lbl{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.3}
  .stat.accent2 .num{color:var(--accent-2)} .stat.warn .num{color:var(--warn)} .stat.accent .num{color:var(--accent)}
  .chart{margin:10px 0 2px}
  .vbar.tappable{width:100%;text-align:left;padding:6px 2px;border-radius:8px}
  .vbar.tappable:active{background:var(--surface-2)}
  .vbar.tappable .chev{flex:none;color:var(--muted)}
  .rowbtn{width:100%;background:none;text-align:left;padding:2px 0;border-radius:8px}
  .rowbtn:active{background:var(--surface-2)}
  .rowbtn .chev{flex:none;color:var(--muted)}
  .histrow{width:100%;text-align:left;display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px}
  .histrow:active{background:var(--surface-2)}
  .histrow .chev{flex:none;color:var(--muted)}
  .gdot{width:9px;height:9px;border-radius:999px;flex:none;display:inline-block}
  .seg{display:flex;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{flex:1;padding:11px 4px;font-size:14px;color:var(--muted);background:none;min-height:44px}
  .seg button.on{background:var(--accent);color:var(--on-accent);font-weight:700}
  .exgroup{border-top:1px solid var(--line)}
  .exgroup:first-of-type{border-top:none}
  .exgroup>summary{list-style:none;display:flex;align-items:center;gap:10px;padding:13px 2px;cursor:pointer;min-height:44px}
  .exgroup>summary::-webkit-details-marker{display:none}
  .exgroup>summary .chev{flex:none;color:var(--muted);transition:transform .15s}
  .exgroup[open]>summary .chev{transform:rotate(90deg)}
  .exgroup[open]{padding-bottom:6px}
  .bodymap{margin:8px 0 2px}
  .cal{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,1fr);gap:2px}
  .cal i{aspect-ratio:1;border-radius:2px;background:var(--surface-2)}
  .cal i.l1{background:rgba(34,197,94,.3)} .cal i.l2{background:rgba(34,197,94,.6)} .cal i.l3{background:var(--accent-2)}
</style>

<script>
"use strict";
/* ---------- theme (System / Light / Dark) ---------- */
const prefersLight = () => { try{ return window.matchMedia && matchMedia("(prefers-color-scheme: light)").matches; }catch(e){ return false; } };
const getTheme = () => { try{ return localStorage.getItem("nextset-theme") || "dark"; }catch(e){ return "dark"; } };
let resolvedTheme = (getTheme()==="light" || (getTheme()==="system" && prefersLight())) ? "light" : "dark";
function applyTheme(){
  const pref=getTheme();
  resolvedTheme = (pref==="light" || (pref==="system" && prefersLight())) ? "light" : "dark";
  try{ document.documentElement && document.documentElement.setAttribute("data-theme", resolvedTheme); }catch(e){}
  try{ const m=document.querySelector('meta[name=theme-color]'); if(m&&m.setAttribute) m.setAttribute("content", resolvedTheme==="light"?"#F4F6F9":"#111827"); }catch(e){}
}
function setTheme(pref){ try{ localStorage.setItem("nextset-theme", pref); }catch(e){} applyTheme(); render(); }
try{ document.documentElement && document.documentElement.setAttribute("data-theme", resolvedTheme); }catch(e){}   // set before first paint to avoid a flash
/* ============================================================
   NextSet — local-first gym tracker (single-file PWA)
   Data: IndexedDB. No network required.
   ============================================================ */

/* ---------- tiny DB layer (IndexedDB) ---------- */
const DB = (() => {
  const NAME = "nextset", VER = 2;
  let db = null;
  const STORES = {
    gyms:      { key:"id" },
    exercises: { key:"id", idx:[["gymId","gymId"]] },     // a "machine" at a gym
    sessions:  { key:"id", idx:[["gymId","gymId"]] },
    sets:      { key:"id", idx:[["sessionId","sessionId"],["exerciseId","exerciseId"]] },
    plans:     { key:"id", idx:[["gymId","gymId"]] },     // a saved, reusable workout (list of exercises)
    meta:      { key:"k" },
  };
  function open(){
    return new Promise((res,rej)=>{
      const r = indexedDB.open(NAME,VER);
      r.onupgradeneeded = e=>{
        const d = e.target.result;
        for(const [name,cfg] of Object.entries(STORES)){
          if(!d.objectStoreNames.contains(name)){
            const s = d.createObjectStore(name,{keyPath:cfg.key});
            (cfg.idx||[]).forEach(([n,kp])=>s.createIndex(n,kp,{unique:false}));
          }
        }
      };
      r.onsuccess = ()=>{db=r.result;res(db)};
      r.onerror = ()=>rej(r.error);
    });
  }
  function tx(store,mode="readonly"){return db.transaction(store,mode).objectStore(store);}
  const put = (store,val)=>new Promise((res,rej)=>{const r=tx(store,"readwrite").put(val);r.onsuccess=()=>res(val);r.onerror=()=>rej(r.error);});
  const del = (store,key)=>new Promise((res,rej)=>{const r=tx(store,"readwrite").delete(key);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
  const get = (store,key)=>new Promise((res,rej)=>{const r=tx(store).get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
  const all = (store)=>new Promise((res,rej)=>{const r=tx(store).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});
  const byIndex = (store,idx,val)=>new Promise((res,rej)=>{const r=tx(store).index(idx).getAll(val);r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});
  return {open,put,del,get,all,byIndex};
})();

/* ---------- helpers ---------- */
const uid = () => (crypto.randomUUID ? crypto.randomUUID()
  : "id-"+Date.now().toString(36)+"-"+Math.floor(performance.now()*1000).toString(36));
const $ = (sel,root=document)=>root.querySelector(sel);
const el = (tag,props={},...kids)=>{
  const n=document.createElement(tag);
  for(const[k,v] of Object.entries(props)){
    if(k==="class")n.className=v;
    else if(k==="html")n.innerHTML=v;
    else if(k.startsWith("on"))n.addEventListener(k.slice(2).toLowerCase(),v);
    else if(v!==false&&v!=null)n.setAttribute(k,v);
  }
  kids.flat().forEach(c=>n.append(c?.nodeType?c:document.createTextNode(c)));
  return n;
};
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const todayISO = () => new Date().toISOString().slice(0,10);
const fmtDate = iso => new Date(iso+"T00:00:00").toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});
const daysAgo = iso => Math.floor((Date.now()-new Date(iso+"T00:00:00").getTime())/864e5);
function toast(msg){
  const host=$("#toastHost"); host.innerHTML="";
  const t=el("div",{class:"toast"},msg); host.append(t);
  setTimeout(()=>t.remove(),1900);
}
function round(n,step){ return Math.round(n/step)*step; }

/* ---------- inline SVG icons (Lucide-style, no emoji) ---------- */

  bulb:'<path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/>',
  arrowdown:'<path d="M12 5v14"/><path d="m19 12-7 7-7-7"/>',
  link:'<path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 1 1 0 10h-2"/><line x1="8" x2="16" y1="12" y2="12"/>',
  search:'<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
  expand:'<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" x2="14" y1="3" y2="10"/><line x1="3" x2="10" y1="21" y2="14"/>',
  info:'<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>',
  star:'<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
  starfill:'<polygon fill="currentColor" points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
};
function ic(name, size=18){
  const s=document.createElement("span");
  s.className="ic"; s.setAttribute("aria-hidden","true");
  s.innerHTML=`<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||""}</svg>`;
  return s;
}

/* ---------- body-part taxonomy + auto-tagger (built-in knowledge) ---------- */
const MUSCLES={
  quads:{label:"Quads",region:"Legs"}, hamstrings:{label:"Hamstrings",region:"Legs"},
  glutes:{label:"Glutes",region:"Legs"}, calves:{label:"Calves",region:"Legs"},
  lats:{label:"Lats",region:"Back"}, upper_back:{label:"Upper Back",region:"Back"}, lower_back:{label:"Lower Back",region:"Back"},
  chest:{label:"Chest",region:"Chest"},
  front_delts:{label:"Front Delts",region:"Shoulders"}, side_delts:{label:"Side Delts",region:"Shoulders"}, rear_delts:{label:"Rear Delts",region:"Shoulders"},
  biceps:{label:"Biceps",region:"Arms"}, triceps:{label:"Triceps",region:"Arms"}, forearms:{label:"Forearms",region:"Arms"},
  core:{label:"Core",region:"Core"}, cardio:{label:"Cardio",region:"Other"},
};
const REGION_ORDER=["Legs","Back","Chest","Shoulders","Arms","Core","Other"];
const muscleLabel=k=>MUSCLES[k]?.label||null;
const regionOf=k=>MUSCLES[k]?.region||"Other";
const exRegion=ex=>ex.primary?regionOf(ex.primary):"Other";
// distinct hue per muscle region — color-codes body-part tags so they read at a glance
const REGION_HUE={Legs:"#60A5FA",Back:"#2DD4BF",Chest:"#FB7185",Shoulders:"#EAB308",Arms:"#A78BFA",Core:"#A3E635",Other:"#9FB0C3"};
const REGION_HUE_LIGHT={Legs:"#2563EB",Back:"#0D9488",Chest:"#E11D48",Shoulders:"#B45309",Arms:"#7C3AED",Core:"#4D7C0F",Other:"#5B6878"};
const regionHue=r=>(resolvedTheme==="light"?REGION_HUE_LIGHT:REGION_HUE)[r] || (resolvedTheme==="light"?"#5B6878":"#9FB0C3");
// a colored muscle/region pill; primary = filled tint, secondary = outline only
function muscleTag(label, region, primary){
  const h=regionHue(region);
  const style = primary ? `color:${h};border:1px solid ${h}66;background:${h}1f`
                        : `color:${h};border:1px solid ${h}40;background:transparent`;
  return el("span",{class:"mtag",style}, label);
}
// deterministic per-gym color (so each gym is identifiable across the app)
const GYM_HUES=["#60A5FA","#34D399","#FB7185","#A78BFA","#22D3EE","#F59E0B","#F472B6","#4ADE80"];
const GYM_HUES_LIGHT=["#2563EB","#059669","#E11D48","#7C3AED","#0891B2","#B45309","#DB2777","#15803D"];
function gymHue(id){ let h=0; for(let i=0;i<(id||"").length;i++) h=(h*31+id.charCodeAt(i))>>>0; const pal=resolvedTheme==="light"?GYM_HUES_LIGHT:GYM_HUES; return pal[h%pal.length]; }
function tintStyle(h, weight){ return `color:${h};border:1px solid ${h}59;background:${h}1f`+(weight?`;font-weight:${weight}`:""); }
// ordered rules — first phrase match wins (specific → general)
const MUSCLE_RULES=[
  [["rowing machine","row erg","row-erg","erg","treadmill","elliptical","stair","stationary bike","spin bike","jump rope","sprint","cardio"],"cardio",null],
  [["leg press","hack squat","hack-squat"],"quads","glutes"],
  [["leg extension","knee extension"],"quads",null],
  [["leg curl","hamstring curl","lying curl","seated leg curl","nordic"],"hamstrings",null],
  [["romanian deadlift","rdl","stiff leg","stiff-leg","good morning"],"hamstrings","glutes"],
  [["hip thrust","glute bridge","glute kickback","glute","abductor","adductor"],"glutes","hamstrings"],
  [["deadlift"],"hamstrings","glutes"],
  [["calf","calves"],"calves",null],
  [["lunge","split squat","bulgarian","step up","step-up","goblet squat","front squat","sissy"],"quads","glutes"],
  [["squat"],"quads","glutes"],
  [["face pull","rear delt","reverse fly","reverse pec","rear-delt"],"rear_delts","upper_back"],
  [["shrug"],"upper_back",null],
  [["upright row"],"side_delts","upper_back"],
  [["lat pulldown","pulldown","pull-down","pull up","pull-up","pullup","chin up","chin-up","chinup"],"lats","biceps"],
  [["straight arm","straight-arm","pullover"],"lats",null],
  [["t-bar","tbar","bent over row","bent-over","barbell row","pendlay","seated row","cable row","machine row","dumbbell row","db row","chest supported","chest-supported","one arm row","one-arm row","inverted row"],"upper_back","biceps"],
  [["row"],"upper_back","biceps"],
  [["back extension","hyperextension","hyper extension","hyper-extension","lower back"],"lower_back",null],
  [["incline bench","incline press","incline chest","incline dumbbell","incline db"],"chest","front_delts"],
  [["bench press","chest press","pec deck","pec fly","chest fly","cable fly","cable crossover","crossover","push up","push-up","pushup","decline press","dip"],"chest","triceps"],
  [["bench"],"chest","triceps"],
  [["overhead press","shoulder press","military","ohp","arnold","push press"],"front_delts","triceps"],
  [["lateral raise","side raise","lateral","laterals"],"side_delts",null],
  [["front raise"],"front_delts",null],
  [["hammer curl","hammer"],"biceps","forearms"],
  [["preacher","bicep","curl","ez curl","ez-bar"],"biceps",null],
  [["tricep","pushdown","push down","press down","pressdown","push-down","skull","overhead extension","kickback","close grip","close-grip","jm press"],"triceps",null],
  [["wrist","forearm","grip","reverse curl"],"forearms",null],
  [["crunch","sit up","sit-up","situp","plank","leg raise","knee raise","russian twist","oblique","hanging","cable crunch","ab wheel","ab roller","woodchop","rotation"],"core",null],
  [["ab ","abs","core"],"core",null],
];
function guessMuscles(name){
  const n=" "+(name||"").toLowerCase()+" ";
  for(const [keys,primary,secondary] of MUSCLE_RULES){
    if(keys.some(k=>n.includes(k))) return {primary, secondary:secondary||null};
  }
  return {primary:null, secondary:null};
}

/* ---------- equipment taxonomy + auto-detect ---------- */
const EQUIP={
  machine:{label:"Machine (selectorized)",gymScoped:true,inc:5},
  plate:{label:"Plate machine (sled)",gymScoped:true,inc:2.5},
  freeplate:{label:"Free plates",gymScoped:false,inc:2.5},
  cable:{label:"Cable",gymScoped:true,inc:5},
  barbell:{label:"Barbell",gymScoped:false,inc:2.5},
  dumbbell:{label:"Dumbbell",gymScoped:false,inc:2.5},
  kettlebell:{label:"Kettlebell",gymScoped:false,inc:4},
  bodyweight:{label:"Bodyweight",gymScoped:false,inc:2.5},
  other:{label:"Other",gymScoped:false,inc:2.5},
};
const EQUIP_ORDER=["barbell","dumbbell","kettlebell","machine","plate","freeplate","cable","bodyweight","other"];
const equipLabel=k=>EQUIP[k]?.label||null;
const equipGymScoped=k=>!!(EQUIP[k]?.gymScoped);
function guessEquipment(name){
  const n=" "+(name||"").toLowerCase()+" ";
  const has=(...ks)=>ks.some(k=>n.includes(k));
  if(has("dumbbell","dumbell"," db ")) return "dumbbell";
  if(has("barbell"," bb ","ez bar","ez-bar","ez curl")) return "barbell";
  if(has("kettlebell"," kb ")) return "kettlebell";
  if(has("cable","crossover","pushdown","push down","face pull","rope ")) return "cable";
  if(has("smith")) return "machine";
  if(has("plate raise","plate front raise","plate ground","plate halo","plate pinch","plate squeeze","plate twist")) return "freeplate";
  if(has("hack squat","hack-squat","t-bar","t bar","tbar","landmine","pendulum squat","plate loaded","plate-loaded","hammer strength","viking press")) return "plate";
  if(has("machine","pec deck","pec fly","leg press","leg extension","leg curl","hamstring curl","pulldown","lat pull","chest press","seated row","row machine","calf raise machine","abductor","adductor")) return "machine";
  if(has("pull up","pull-up","pullup","chin up","chin-up","chinup","push up","push-up","pushup","dip","plank","crunch","sit up","sit-up","situp","hanging","muscle up","pistol","burpee","mountain climber","bodyweight","ab wheel")) return "bodyweight";
  if(has("treadmill","elliptical","stationary bike","spin bike","rowing machine","row erg","stair climber","stairmaster")) return "machine";
  if(has("bench press","incline bench","decline bench","squat","deadlift","romanian","rdl","overhead press","ohp","military","clean","snatch","good morning","lunge","barbell row","bent over row","bent-over","shrug","hip thrust","press")) return "barbell";
  if(has("curl","fly","flye","lateral raise","front raise","raise","kickback","extension")) return "dumbbell";
  return "other";
}
const isBW = ex => !!(ex && ex.equipment==="bodyweight");
const isPlate = ex => !!(ex && ex.equipment==="plate");
// short display of a logged set — bodyweight: `weight` = ADDED load (0 = bodyweight); plate: 0 = sled only
function fmtSetShort(ex,w,r){
  if(isBW(ex)) return (+w>0) ? `+${w}${ex.unit||"kg"}×${r}` : `${r} reps`;
  if(isPlate(ex) && +w===0) return `${r} reps · sled only`;
  return `${w}${ex.unit||"kg"}×${r}`;
}
/* ---------- rest between sets (evidence-based) + time estimate ---------- */
// movement pattern → compound (multi-joint, rest longer) vs isolation (single-joint, rest less)
const ISO_KEYS=["curl","fly","flye","raise","pushdown","push down","pressdown","press down","extension","pullover","shrug","calf","kickback","crossover","pec deck","pec fly","face pull","reverse fly","rear delt","lateral","wrist","forearm","grip","crunch","sit up","sit-up","situp","plank","leg raise","knee raise","russian twist","oblique","bicep","tricep","abductor","adductor","abduction","adduction","leg curl","leg extension"];
const COMPOUND_KEYS=["squat","deadlift","rdl","romanian","bench","press","row","pulldown","pull down","pull up","pull-up","pullup","chin up","chin-up","chinup","dip","lunge","split squat","bulgarian","step up","step-up","hip thrust","thruster","clean","snatch","good morning","push up","push-up","pushup","arnold"];
function guessMovement(name){
  const n=" "+(name||"").toLowerCase()+" ";
  if(ISO_KEYS.some(k=>n.includes(k))) return "isolation";   // check single-joint first (e.g. "chest fly", "leg curl")
  if(COMPOUND_KEYS.some(k=>n.includes(k))) return "compound";
  return "isolation"; // unknown → shorter rest (conservative)
}
// recommended rest (seconds) from rep range × movement — grounded in ACSM/Schoenfeld guidance:
// strength 3–5 min, hypertrophy compound ~2 min, isolation 60–90s, endurance 30–60s
function suggestRest(ex){
  if(ex && ex.primary==="cardio") return 30;
  const reps=(ex&&ex.repMax)||12, comp=guessMovement(ex&&ex.name)==="compound";
  if(reps<=5)  return comp?180:120;   // strength
  if(reps<=12) return comp?120:75;    // hypertrophy
  if(reps<=20) return comp?75:60;     // endurance
  return 45;                          // very high rep / conditioning
}
const restOf = ex => (ex && ex.restSec!=null) ? ex.restSec : suggestRest(ex||{});
function fmtRest(sec){
  if(sec%60===0) return `${sec/60} min`;
  if(sec<120) return `${sec}s`;
  return `${(sec/60).toFixed(1)} min`;
}
// time estimate (minutes) for one exercise = setup + work + rest between sets (n-1 gaps)
function exMinutes(ex, nSets){
  if(!ex) return 0;
  const sets=Math.max(1, nSets||ex.sets||3);
  const workSec=(ex.repMax||12)*3;            // ~3s per rep tempo
  return Math.max(1, Math.round((60 + sets*workSec + Math.max(0,sets-1)*restOf(ex))/60));
}
const BETWEEN_REST_MIN = 3; // assume ~3 min rest walking/resting between exercises
// rest gaps between exercises — supersetted (same ssGroup) neighbours don't rest, so count only group transitions
const betweenRests = items => { let n=0; for(let i=0;i<items.length-1;i++){ const a=items[i].ssGroup,b=items[i+1].ssGroup; if(!(a&&b&&a===b)) n++; } return n; };
const planMinutes = items => items.reduce((t,it)=>{
  const ex=State.exercises.find(e=>e.id===it.exerciseId);
  return t + exMinutes(ex, it.sets?.length);
},0) + BETWEEN_REST_MIN*betweenRests(items);

/* ---------- app state ---------- */
const State = {
  gyms:[], exercises:[], plans:[], currentGymId:null, activeSession:null, volTargetPct:4,
};
async function loadState(){
  State.gyms = await DB.all("gyms");
  State.exercises = await DB.all("exercises");
  State.plans = await DB.all("plans");
  // backfill tags for exercises saved before tagging existed (uses built-in knowledge)
  for(const ex of State.exercises){
    let changed=false;
    if(ex.primary===undefined){ const g=guessMuscles(ex.name); ex.primary=g.primary; ex.secondary=g.secondary; changed=true; }
    if(ex.equipment===undefined){
      ex.equipment=guessEquipment(ex.name);
      // free-weight / bodyweight exercises are global (not pinned to a gym)
      if(!equipGymScoped(ex.equipment)) ex.gymId=null;
      changed=true;
    }
    if(ex.restSec===undefined){ ex.restSec=suggestRest(ex); changed=true; }
    if(changed) await DB.put("exercises",ex);
  }
  // one-time migration: old dumbbell default increment was 2 kg — standardize to 2.5
  if(!(await DB.get("meta","dbInc25"))){
    for(const ex of State.exercises){
      if(ex.equipment==="dumbbell" && ex.increment===2){ ex.increment=2.5; await DB.put("exercises",ex); }
    }
    await setMeta("dbInc25", true);
  }
  const m = await DB.get("meta","currentGymId");
  State.currentGymId = m?.v || State.gyms[0]?.id || null;
  const as = await DB.get("meta","activeSession");
  State.activeSession = as?.v || null;
  const vt = await DB.get("meta","volTargetPct");
  State.volTargetPct = (vt && Number.isFinite(+vt.v) && +vt.v>0) ? +vt.v : 4;
  // resume only if same day
  if(State.activeSession && State.activeSession.date !== todayISO()){
    State.activeSession=null; await DB.put("meta",{k:"activeSession",v:null});
  }
}
const setMeta = (k,v)=>DB.put("meta",{k,v});
const getMeta = async (k)=>{ const r=await DB.get("meta",k); return r?r.v:null; };
const progKey = ex => "prog:"+((ex&&ex.linkId)||(ex&&ex.id));   // per-exercise volume miss-streak (pooled across linked machines)
const curGym = ()=>State.gyms.find(g=>g.id===State.currentGymId)||null;
// a gym's exercises = its gym-scoped machines/cables + all global (free-weight/bodyweight) exercises
const gymExercises = (gid=State.currentGymId)=>State.exercises.filter(e=>e.gymId===gid || e.gymId==null);
// saved plans (routines) are global — they travel with you and adapt to whatever gym you're in
const allPlans = ()=>State.plans;
// resolve a plan's stored exercise to the equivalent at a given gym:
// globals work anywhere; a machine from another gym maps via its cross-gym link, then by name
function resolveExerciseAtGym(exerciseId, gid=State.currentGymId){
  const ex=State.exercises.find(e=>e.id===exerciseId);
  if(!ex) return null;                                  // exercise was deleted
  if(ex.gymId==null || ex.gymId===gid) return ex;       // global, or already at this gym
  if(ex.linkId){                                         // same machine confirmed across gyms
    const linked=State.exercises.find(e=>e.gymId===gid && e.linkId===ex.linkId);
    if(linked) return linked;
  }
  const t=normName(ex.name);                             // same-named machine set up here
  return State.exercises.find(e=>e.gymId===gid && equipGymScoped(e.equipment) && normName(e.name)===t) || null;
}
const templateMinutes = plan => plan.items.reduce((t,it)=>{ const ex=State.exercises.find(e=>e.id===it.exerciseId); return t + exMinutes(ex, it.sets); },0) + BETWEEN_REST_MIN*Math.max(0, plan.items.length-1);
function planRegions(plan){ return [...new Set(plan.items.map(it=>{const ex=State.exercises.find(e=>e.id===it.exerciseId);return ex?exRegion(ex):null;}).filter(r=>r&&r!=="Other"))]; }
function suggestPlanName(items){ const regs=[...new Set(items.map(it=>{const ex=State.exercises.find(e=>e.id===it.exerciseId);return ex?exRegion(ex):null;}).filter(r=>r&&r!=="Other"))]; return regs.length? regs.slice(0,2).join(" & ") : "My plan"; }
const normName = s => (s||"").toLowerCase().replace(/[^a-z0-9]+/g," ").trim();
const gymNameOf = id => State.gyms.find(g=>g.id===id)?.name || "";
// exercises confirmed as the SAME physical machine share a linkId; return every id in the group
const linkedIds = exerciseId => {
  const ex=State.exercises.find(e=>e.id===exerciseId);
  if(!ex||!ex.linkId) return [exerciseId];
  return State.exercises.filter(e=>e.linkId===ex.linkId).map(e=>e.id);
};

/* ============================================================
   PROGRESSION ENGINE  (double progression + RPE modifier)
   ============================================================ */
async function lastSetsFor(exerciseId, beforeSessionId=null){
  let sets=[];
  for(const id of linkedIds(exerciseId)) sets=sets.concat(await DB.byIndex("sets","exerciseId",id));
  if(!sets.length) return null;
  // group by session, find most recent completed session (excluding current)
  const bySession = {};
  for(const s of sets){ (bySession[s.sessionId]=bySession[s.sessionId]||[]).push(s); }
  const sessions = await DB.all("sessions");
  const order = sessions.filter(se=>bySession[se.id] && se.id!==beforeSessionId)
    .sort((a,b)=> (b.date+b.startedAt).localeCompare(a.date+a.startedAt));
  if(!order.length) return null;
  const last = order[0];
  const ls = bySession[last.id].filter(s=>s.reps>0).sort((a,b)=>a.order-b.order);
  return ls.length ? {session:last, sets:ls} : null;
}
// How many consecutive recent sessions stalled at the same top weight
async function stallCount(exerciseId){
  let sets=[];
  for(const id of linkedIds(exerciseId)) sets=sets.concat(await DB.byIndex("sets","exerciseId",id));
  const sessions = (await DB.all("sessions"));
  const bySession={};
  for(const s of sets){ if(s.reps>0)(bySession[s.sessionId]=bySession[s.sessionId]||[]).push(s); }
  const ordered = sessions.filter(se=>bySession[se.id])
    .sort((a,b)=>(b.date+b.startedAt).localeCompare(a.date+a.startedAt));
  let topWeights = ordered.map(se=>Math.max(...bySession[se.id].map(x=>x.weight)));
  let n=0; for(let i=1;i<topWeights.length;i++){ if(topWeights[i]===topWeights[0])n++; else break; }
  return n; // sessions before today at same top weight
}

// How aggressively to grow volume each session (user setting, %). Default 4.
function volTarget(){ const v=State.volTargetPct; return Number.isFinite(v)&&v>0 ? v : 4; }

async function suggestNext(ex){
  const prev = await lastSetsFor(ex.id, State.activeSession?.id);
  const sets = Math.max(1, ex.sets||3);
  const repMin = ex.repMin||8, repMax = ex.repMax||12, inc = ex.increment||2.5;
  if(!prev){
    return { plan: Array.from({length:sets},()=>({weight:0,reps:repMin,target:repMin})),
             note: isBW(ex)?"First time — log your reps and I'll progress them next time.":"First time on this — log a working set and I'll progress it next time.", kind:"new" };
  }
  // pure bodyweight / sled-only (no working load → can't compute volume) keeps classic double progression
  const base = Math.max(0, ...prev.sets.map(s=>+s.weight||0));
  if(base<=0) return classicNext(ex, prev, {sets,repMin,repMax,inc});
  // weighted → volume model. If you fell short of the target last time, HOLD (no progression);
  // two short sessions running → ease back ~10% to rebuild. Otherwise climb by your target %.
  const pct = volTarget(), pl = isPlate(ex);
  const fmtVol = n => Math.round(n).toLocaleString(undefined);
  const streak = (await getMeta(progKey(ex)))?.streak || 0;
  let plan, note, kind, targetVol;
  if(streak>=1){
    // missed last time → hold the same target and keep trying until you hit it (no auto-deload)
    const {seed,Vlast} = normalizeSeed(prev.sets, sets);
    plan = seed.map(s=>({weight:s.weight,reps:s.reps})); targetVol = Vlast; kind = "hold";
    note = streak>=3
      ? `Same target ~${fmtVol(Vlast)} — ${streak} sessions running. Stick with it; if it's truly not moving, ease the weight down a notch yourself.`
      : `Came up short last time — holding at ~${fmtVol(Vlast)} (no increase). Nail it and we add load again next.`;
  } else {
    const r = volumeProgress(prev.sets, {sets,repMin,repMax,inc,pct});
    plan = r.plan; targetVol = r.Vnew;
    kind = r.weightAdded ? "weight" : (r.repAdded ? "rep" : "repeat");
    const gain = r.Vlast>0 ? Math.round((r.Vnew-r.Vlast)/r.Vlast*100) : 0;
    const top = Math.max(...r.plan.map(s=>s.weight));
    note = `Target +${pct}% volume — ~${fmtVol(r.Vnew)} vs ${fmtVol(r.Vlast)} last time (+${gain}%). ` + (r.weightAdded ? `Top set → ${fmtW(top,ex)}${pl?" added":""}.` : `Same weights, +reps.`);
  }
  const outPlan = plan.map(s=>({weight:s.weight, reps:s.reps, target:s.reps}));
  return { plan: outPlan, note, kind, prev, targetVol };
}

// classic double progression — used for bodyweight & sled-only, where true volume isn't computable
async function classicNext(ex, prev, {sets,repMin,repMax,inc}){
  const workW = Math.max(...prev.sets.map(s=>s.weight));
  const atWork = prev.sets.filter(s=>s.weight===workW);
  const repsAt = atWork.map(s=>s.reps);
  const minReps = Math.min(...repsAt), maxReps = Math.max(...repsAt);
  const allTop = repsAt.every(r=>r>=repMax);
  const rpe = atWork.map(s=>s.rpe).filter(Boolean);
  const allEasy = rpe.length===atWork.length && rpe.every(r=>r==="easy");
  const anyGrind = rpe.some(r=>r==="grind");
  const bw = isBW(ex);
  const loadStr = w => bw ? ((+w)>0 ? `+${fmtW(w,ex)}` : "bodyweight")
    : (isPlate(ex)&&(+w)===0 ? "sled only" : fmtW(w,ex));
  let plan, note, kind="rep";
  if(allTop || (allEasy && minReps>=Math.floor((repMin+repMax)/2))){
    const w = round(workW+inc, inc);
    plan = Array.from({length:sets},()=>({weight:w,reps:repMin,target:repMin}));
    note = `${bw?"Add load":"Add weight"} → ${loadStr(w)} × ${repMin} — up from ${loadStr(workW)} last time. You ${allTop?`hit ${repMax}+ ${bw?"reps":"on every set"}`:"left reps in the tank"}.`;
    kind="weight";
  } else if(minReps>=repMin){
    const tgt = Math.min(maxReps+1, repMax);
    plan = Array.from({length:sets},()=>({weight:workW,reps:tgt,target:tgt}));
    note = `${bw? (workW>0?loadStr(workW):"Bodyweight") : (isPlate(ex)&&workW===0?"Sled only":`Same weight ${fmtW(workW,ex)}`)} → push for ${tgt} reps.${anyGrind?" (last set was a grind — only if it moves.)":""}`;
  } else {
    plan = Array.from({length:sets},()=>({weight:workW,reps:repMin,target:repMin}));
    note = `${bw?`Repeat ${loadStr(workW)} for ${repMin} reps`:`Repeat ${fmtW(workW,ex)} × ${repMin}`} — you missed the bottom of the range last time.`;
    kind="repeat";
    const stalls = await stallCount(ex.id);
    if(stalls>=2 && !((bw||isPlate(ex)) && workW===0)){
      const dw = round(workW*0.9, inc);
      note = `${bw?`Stalled ${stalls+1} sessions at ${loadStr(workW)}. Drop to ${loadStr(dw)}`:`Stalled ${stalls+1} sessions at ${fmtW(workW,ex)}. Consider a deload to ${fmtW(dw,ex)}`} and rebuild.`;
      kind="deload";
      plan = Array.from({length:sets},()=>({weight:dw,reps:repMin,target:repMin}));
    }
  }
  return {plan,note,kind,prev};
}

// pure volume-target solver: beat last session's tonnage by ~pct%, rolling the lightest set up to
// the next load once all sets are at the top of the rep range. A graduated set keeps enough reps to
// not drop below its old volume (no dip). Returns {plan,Vlast,Vnew,weightAdded,repAdded}.
// normalize a past session's sets into exactly `sets` working sets (drop the lightest extras, pad
// with the lightest), sorted light→heavy. Shared by progress / hold / deload. Returns {seed, Vlast}.
function normalizeSeed(lastSets, sets){
  let seed = (lastSets||[]).map(s=>({weight:+s.weight||0, reps:+s.reps||0})).filter(s=>s.reps>0);
  if(!seed.length) seed=[{weight:0,reps:1}];
  if(seed.length>sets) seed = seed.slice().sort((a,b)=> b.weight-a.weight || b.reps-a.reps).slice(0,sets);
  while(seed.length<sets){ const l=seed.reduce((a,b)=> (b.weight<a.weight||(b.weight===a.weight&&b.reps<a.reps))?b:a); seed.push({weight:l.weight,reps:l.reps}); }
  seed.sort((a,b)=> a.weight-b.weight || a.reps-b.reps);
  return { seed, Vlast: seed.reduce((t,s)=>t+s.weight*s.reps,0) };
}
function volumeProgress(lastSets, {sets,repMin,repMax,inc,pct}){
  const { seed, Vlast } = normalizeSeed(lastSets, sets);
  const vol = arr => arr.reduce((t,s)=>t+s.weight*s.reps,0);
  const Vtarget = Vlast*(1+pct/100);
  const plan = seed.map(s=>({weight:s.weight,reps:s.reps}));
  let weightAdded=false, repAdded=false, guard=0;
  while(vol(plan) < Vtarget && guard++ < 600){
    let i=-1, few=Infinity;                                            // cheapest move: +1 rep on the fewest-rep set under the cap
    for(let k=0;k<plan.length;k++){ if(plan[k].reps<repMax && plan[k].reps<few){ few=plan[k].reps; i=k; } }
    if(i>=0){ plan[i].reps++; repAdded=true; continue; }
    let j=0; for(let k=1;k<plan.length;k++){ if(plan[k].weight<plan[j].weight) j=k; }  // all maxed → graduate the lightest set
    const oldVol=plan[j].weight*plan[j].reps;
    plan[j].weight=round(plan[j].weight+inc, inc);
    plan[j].reps=Math.max(repMin, Math.min(repMax, Math.ceil(oldVol/plan[j].weight)));
    weightAdded=true;
    plan.sort((a,b)=> a.weight-b.weight || a.reps-b.reps);
  }
  return { plan, Vlast, Vnew: vol(plan), weightAdded, repAdded };
}
const fmtW = (w,ex)=> `${(+w).toLocaleString(undefined,{maximumFractionDigits:2})}${ex.unit||"kg"}`;

/* ---------- "same machine" linking across gyms ---------- */
// a gym-scoped, same-named machine at a DIFFERENT gym, not already linked to ex
function findSameNameOtherGym(ex){
  const t=normName(ex.name);
  return State.exercises.find(e=> e.id!==ex.id && e.gymId!=null && e.gymId!==ex.gymId
    && normName(e.name)===t && !(ex.linkId && e.linkId===ex.linkId));
}
async function linkExercises(a,b){
  const lid = b.linkId || a.linkId || b.id;
  a.linkId=lid; b.linkId=lid;
  await DB.put("exercises",a); await DB.put("exercises",b);
  State.exercises=await DB.all("exercises");
}
// ask once, in context, whether a newly-added machine is the same as one at another gym
function maybePromptSameMachine(ex){
  if(!equipGymScoped(ex.equipment)) return;        // only machines/cables are gym-bound
  const other=findSameNameOtherGym(ex);
  if(!other) return;
  openSheet("Same machine?", (body,close)=>{
    body.append(el("p",{class:"small muted",style:"margin-top:-6px"},
      `You also have "${other.name}" at ${gymNameOf(other.gymId)}. If it's the exact same machine, I'll combine their progress into one trend. If they feel different (e.g. one's a cable, the other a plate machine), keep them separate.`));
    body.append(
      el("button",{class:"btn",onClick:async()=>{ await linkExercises(ex,other); close(); render(); toast("Combined — progress is now shared"); }}, ic("check"), "Same machine — combine"),
      el("button",{class:"btn secondary",style:"margin-top:8px",onClick:close}, "Different machine"));
  });
}

      el("div",{style:"font-weight:700;font-size:18px"},"Today's workout"),
      el("div",{class:"small muted",style:"margin-top:2px"}, `${curGym()?.name||""} · ${sum}`),
      el("button",{class:"btn",style:"width:100%;margin-top:14px;font-size:16px",onClick:startWorkout}, ic("play"), "Start workout"),
      el("div",{class:"row",style:"gap:8px;margin-top:8px"},
        el("button",{class:"btn secondary sm",style:"flex:1",onClick:openPlanSheet}, ic("clipboard"), s.items.length?"Edit plan":"Add exercises"),
        el("button",{class:"btn ghost sm",style:"flex:1",onClick:discardSession}, ic("x"), "Discard"))
    ));
    if(s.items.length) s.items.forEach(it=>wrap.append(previewRow(it)));
    else wrap.append(el("p",{class:"muted small",style:"text-align:center;margin-top:10px"},"Add exercises, then start your workout."));
    return wrap;
  }
  // ----- IN PROGRESS: logging -----
  wrap.append(el("div",{class:"statuscard"},
    el("div",{class:"row between",style:"align-items:flex-start;gap:10px"},
      el("div",{style:"min-width:0"},
        el("div",{class:"statuscard-eyebrow"},"Workout in progress"),
        el("div",{style:"font-weight:700;font-size:17px"}, fmtDate(s.date)),
        el("div",{class:"small muted",style:"margin-top:2px"}, `${curGym()?.name||""}${s.items.length?` · ~${planMinutes(s.items)} min · ${s.items.length} ex`:""}`)),
      el("button",{class:"btn sm",style:"flex:none;background:var(--accent-2);color:var(--on-accent-2)",onClick:finishSession},ic("check"),"Finish")),
    el("button",{class:"btn secondary sm",style:"width:100%;margin-top:10px",onClick:openPlanSheet}, ic("clipboard"), "Edit plan")
  ));
  if(!s.items.length){
    wrap.append(el("div",{class:"empty"},
      el("div",{class:"big"},ic("clipboard",42)),
      el("p",{class:"muted"},"No exercises yet."),
      el("button",{class:"btn",onClick:openPlanSheet},ic("plus"),"Add exercises")
    ));
  } else {
    const items=s.items, curIdx = items.findIndex(it=>!isItemDone(it));   // the exercise you're on now
    let i=0, gi=0;
    while(i<items.length){
      const g=items[i].ssGroup;
      let j=i+1; if(g){ while(j<items.length && items[j].ssGroup===g) j++; }
      if(g && j-i>=2){           // a real superset run of 2+ adjacent exercises
        gi++; const letter=String.fromCharCode(64+gi);
        const box=el("div",{class:"ssgroup"});
        box.append(el("div",{class:"sshead"}, el("span",{class:"ssbadge"},"Superset "+letter),
          el("span",{class:"tiny muted"},"alternate · rest after the group")));
        for(let k=i;k<j;k++) box.append(loggerCard(items[k], k===curIdx, {letter, n:k-i+1}));
        wrap.append(box); i=j;
      } else { wrap.append(loggerCard(items[i], i===curIdx)); i++; }
    }
    wrap.append(el("button",{class:"btn ghost",style:"margin-top:4px",onClick:openPlanSheet},ic("plus"),"Add exercise"));
  }
  return wrap;
}

// per-exercise training status (cached; invalidated when a workout is logged): tried + progressing
let _exStatus=null;
async function getExStatus(){
  if(_exStatus) return _exStatus;
  const [allSets, sessions]=await Promise.all([DB.all("sets"), DB.all("sessions")]);
  const sesKey={}; sessions.forEach(s=>{ sesKey[s.id]=(s.date||"")+(s.startedAt||""); });
  const byEx={}; allSets.forEach(x=>{ if(x.reps>0)(byEx[x.exerciseId]=byEx[x.exerciseId]||[]).push(x); });
  const map={};
  for(const ex of State.exercises){
    let sets=[]; for(const id of linkedIds(ex.id)) sets=sets.concat(byEx[id]||[]);
    if(!sets.length){ map[ex.id]={tried:false,progressing:false}; continue; }
    const bw=isBW(ex), bySes={};
    sets.forEach(x=>{ const m=bw?x.reps:(+x.weight||0); bySes[x.sessionId]=Math.max(bySes[x.sessionId]||0,m); });
    const ord=Object.keys(bySes).sort((a,b)=>(sesKey[b]||"").localeCompare(sesKey[a]||""));
    map[ex.id]={tried:true, progressing: ord.length>=2 && bySes[ord[0]]>bySes[ord[1]]};
  }
  _exStatus=map; return map;
}

// glanceable progression cue vs last time (the note below carries the detail)
function progBadge(item){
  if(item.kind==="weight") return el("span",{class:"progpill up"},"↑ heavier");
  if(item.kind==="rep")    return el("span",{class:"progpill up"},"↑ more reps");
  if(item.kind==="deload") return el("span",{class:"progpill down"},"↓ deload");
  if(item.kind==="hold")   return el("span",{class:"progpill hold"},"→ hold");
  return null;
}
// an exercise counts as done once it's minimized, or every set is checked off
const isItemDone = item => !!item.collapsed || (item.sets.length>0 && item.sets.every(s=>s.done));

// where a tapped "drop set" should land: right after the CURRENT ACTIVE set (first not-done),
// chained past any drops already on that set. Anchors on the set you're working now — not the last done.
function dropInsertIndex(sets){
  let ai=sets.findIndex(s=>!s.done);
  if(ai===-1) ai=sets.length-1;                            // all done → after the last set
  while(ai+1<sets.length && sets[ai+1].drop) ai++;         // keep chained drops together
  return ai+1;
}

/* set logger card for an item in the active session.
   isCurrent = the exercise you're working on now (first not-done one). */
function loggerCard(item, isCurrent, ss){
  const ex = State.exercises.find(e=>e.id===item.exerciseId);
  const bw = isBW(ex);

  // ----- MINIMIZED (done) view: compact summary, tap to expand/edit -----
  if(item.collapsed){
    const logged=item.sets.filter(s=>s.done && s.reps>0);
    const summary=logged.length? logged.map(s=>fmtSetShort(ex,s.weight,s.reps)).join(" · ") : "No sets logged";
    const expand=()=>{ item.collapsed=false; persistSession(); render(); };
    const card=el("div",{class:"card done"});
    card.append(el("div",{class:"row between",style:"gap:10px"},
      el("div",{class:"row",style:"gap:10px;align-items:center;min-width:0",role:"button",tabindex:"0","aria-label":`Expand ${ex?.name||"exercise"}`,
          onClick:expand, onKeydown:e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();expand();}}},

  }

  // ----- EXPANDED view -----

  const card=el("div",{class:"card lcard"+(isCurrent?" current":"")});

    onClick:()=>ex&&openExerciseProgress(ex.id), onKeydown:e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();ex&&openExerciseProgress(ex.id);}}}, ic("dumbbell",16));
  if(ex) exerciseImageId(ex).then(id=>{ if(id){ const im=document.createElement("img"); im.src=libImageUrl(id,0); im.loading="lazy"; im.alt=""; im.onerror=()=>im.remove(); thumb.append(im); } });
  const head=el("div",{class:"row between",style:"margin-bottom:10px;gap:10px"},

      el("div",{class:"row",style:"gap:8px;align-items:center;flex-wrap:wrap"},
        ...(ss?[el("span",{class:"ssbadge"}, ss.letter+ss.n)]:[]),
        ...(isCurrent?[el("span",{class:"nowtag"},"NOW")]:[]),
        el("div",{style:"font-weight:700"},ex?.name||"Exercise"), ...(pb?[pb]:[])),
      el("div",{class:"tiny muted"}, ex?`${ex.sets}×${ex.repMin}–${ex.repMax} · ${fmtRest(restOf(ex))} rest`:"")),
    thumb
  );
  card.append(head);
  if(item.note) card.append(el("div",{class:"suggestion"+(["deload","repeat"].includes(item.kind)?" warn":"")}, item.note));
  if(item.last && item.last.sets.length){
    const lt=el("div",{class:"lasttime"}, el("span",{class:"lbl"},"Last time"));
    item.last.sets.forEach((s,i)=> lt.append(el("span",{class:"lt-set"}, el("b",{},String(i+1)), fmtSetShort(ex,s.weight,s.reps))));
    card.append(lt);
  }

  const wUnit = bw ? "+"+(ex?.unit||"kg") : (ex?.unit||"kg");
  let setNo=0;
  item.sets.forEach((set,si)=>{
    const drop=!!set.drop; if(!drop) setNo++;
    const row=el("div",{class:"setrow"+(set.done?" locked":"")+(drop?" drop":"")});
    row.append(drop ? el("div",{class:"idx","aria-label":"drop set"},"▾") : el("div",{class:"idx"}, setNo));
    const wStep=stepper(set.weight, ex?.increment||2.5, v=>{set.weight=Math.max(0,v);persistSession();}, wUnit, set.done);
    const rStep=stepper(set.reps, 1, v=>{set.reps=Math.max(0,Math.round(v));persistSession();}, "reps", set.done);
    if(bw){ row.append(rStep, wStep); } else { row.append(wStep, rStep); }
    const done=el("button",{class:"done"+(set.done?" on":""),"aria-label":set.done?"Unlock set":"Complete set","aria-pressed":set.done?"true":"false",onClick:async()=>{
      set.done=!set.done;

        const nxt=item.sets[si+1];   // carry weight/reps onto the next un-logged straight set (not a drop)
        if(nxt && !nxt.done && !nxt.drop){ nxt.weight=set.weight; nxt.reps=set.reps; }

  const sitems=State.activeSession.items, idx=sitems.indexOf(item);
  const grouped = item.ssGroup && ((sitems[idx-1]&&sitems[idx-1].ssGroup===item.ssGroup)||(sitems[idx+1]&&sitems[idx+1].ssGroup===item.ssGroup));
  const ctl=el("div",{style:"margin-top:12px"});

    el("button",{class:"btn",style:"width:100%;background:var(--accent-2);color:var(--on-accent-2)","aria-label":"Mark exercise done",onClick:()=>{
      item.sets.forEach(s=>{ if((+s.reps)>0) s.done=true; });

      toast(`${ex?.name||"Exercise"} done`);
    }},ic("check",16),"Done — log & minimize"),
    el("div",{class:"row",style:"gap:8px;margin-top:8px"},
      el("button",{class:"btn secondary sm",style:"flex:1","aria-label":"Add set",onClick:()=>{
        const last=item.sets[item.sets.length-1];
        item.sets.push({weight:last?.weight||0,reps:last?.reps||(ex?.repMin||8),done:false});
        persistSession();render();
      }},ic("plus",16),"Add set"),
      el("button",{class:"btn secondary sm",style:"flex:1","aria-label":"Add drop set",onClick:()=>{
        const di=dropInsertIndex(item.sets), base=item.sets[di-1];                        // after the current active set (+ any drops on it)
        item.sets.splice(di, 0, {weight:round((base?.weight||0)*0.8, ex?.increment||2.5), reps:base?.reps||(ex?.repMin||8), done:false, drop:true});
        persistSession();render();
      }},ic("arrowdown",16),"Drop set")
    ),
    el("button",{class:"btn ghost sm","aria-label":"Remove last set",style:"width:100%;margin-top:8px",onClick:()=>{ if(item.sets.length>1){item.sets.pop();persistSession();render();} }},ic("minus",16),"Remove set"),
    el("div",{class:"row",style:"gap:8px;margin-top:8px"},
      el("button",{class:"btn ghost sm","aria-label":"Replace exercise",style:"flex:1",onClick:()=>{
        if(item.sets.some(s=>s.done) && !confirm("Swap this exercise out? The sets you've logged for it will be cleared.")) return;
        openReplaceSheet(item);
      }},ic("link",16),"Replace"),
      el("button",{class:"btn ghost sm","aria-label":"Remove exercise from workout",style:"flex:1",onClick:()=>{
        State.activeSession.items=State.activeSession.items.filter(x=>x!==item);persistSession();render();
      }},ic("x",16),"Remove")
    ),
    ...(grouped
      ? [el("button",{class:"btn ghost sm",style:"width:100%;margin-top:8px",onClick:()=>ungroupSS(item)},ic("x",15),"Ungroup superset")]
      : idx<sitems.length-1
        ? [el("button",{class:"btn ghost sm",style:"width:100%;margin-top:8px",onClick:()=>groupWithNext(item)},ic("link",15),"Superset with next")]
        : [])
  );
  card.append(ctl);
  return card;
}
function groupWithNext(item){
  const items=State.activeSession.items, i=items.indexOf(item), nxt=items[i+1]; if(!nxt) return;
  const gid=item.ssGroup||nxt.ssGroup||("ss-"+uid());
  item.ssGroup=gid; nxt.ssGroup=gid;
  persistSession(); render(); toast("Grouped as a superset");
}
function ungroupSS(item){
  const g=item.ssGroup; if(!g) return;
  State.activeSession.items.forEach(it=>{ if(it.ssGroup===g) delete it.ssGroup; });
  persistSession(); render(); toast("Superset ungrouped");
}
// swap a workout item to a different exercise (added the wrong one) — re-seeds from the new exercise's history
async function replaceExercise(item, newEx){
  const sug=await suggestNext(newEx);
  const base=sug.plan;
  item.exerciseId=newEx.id;
  item.kind=sug.kind; item.note=sug.note; item.targetVol=sug.targetVol??null;
  item.last=sug.prev?{date:sug.prev.session.date, sets:sug.prev.sets.map(s=>({weight:s.weight,reps:s.reps}))}:null;
  item.joint=false; item.rpe=null; item.collapsed=false;
  item.sets=Array.from({length:Math.max(1,base.length)},(_,i)=>{ const p=base[Math.min(i,base.length-1)]||{weight:0,reps:newEx.repMin||8}; return {weight:p.weight,reps:p.reps,done:false}; });
  await persistSession(); render(); toast(`Swapped in ${newEx.name}`);
}
function openReplaceSheet(item){
  const cur=State.exercises.find(e=>e.id===item.exerciseId);
  const inWorkout=new Set(State.activeSession.items.map(i=>i.exerciseId));
  openSheet(`Replace ${cur?.name||"exercise"}`,(body,close)=>{
    body.append(el("p",{class:"small muted",style:"margin:-4px 0 12px"},"Pick the exercise you meant — its sets get pre-filled from its own history."));
    const gx=gymExercises().filter(e=>e.id!==item.exerciseId && !inWorkout.has(e.id));
    if(gx.length){
      REGION_ORDER.forEach(region=>{
        const inRegion=sortForAdd(gx.filter(e=>exRegion(e)===region));
        if(!inRegion.length)return;
        body.append(el("div",{class:"regionhead"},region));
        inRegion.forEach(ex=> body.append(addExerciseCard(ex, async()=>{ await replaceExercise(item, ex); close(); }, "Swap")));
      });
      decorateAddStatus();
    } else {
      body.append(el("p",{class:"muted small"},"No other exercises set up at this gym yet — create one below."));
    }
    body.append(el("div",{class:"divider"}),
      el("button",{class:"btn secondary",onClick:()=>{ close(); openExerciseSheet(null,{onCreate: async ex=>{ await replaceExercise(item, ex); }}); }},ic("plus",16),"Create a new exercise"),
      el("button",{class:"btn",style:"margin-top:10px",onClick:close},"Cancel"));
  });
}

/* stepper input with +/- ; pass disabled=true to lock it (e.g. a completed set) */
function stepper(value, step, onChange, unit, disabled){
  const wrap=el("div",{class:"stepper"+(disabled?" locked":"")});
  const input=el("input",{type:"number",inputmode:"decimal","aria-label":unit,value:value??0,step});
  const dec=el("button",{"aria-label":`Decrease ${unit}`,onClick:()=>{input.value=Math.max(0,(+input.value||0)-step);onChange(+input.value);}},ic("minus",20));
  const inc=el("button",{"aria-label":`Increase ${unit}`,onClick:()=>{input.value=(+input.value||0)+step;onChange(+input.value);}},ic("plus",20));
  if(disabled){ input.disabled=true; input.readOnly=true; dec.disabled=true; inc.disabled=true; }
  input.addEventListener("change",()=>onChange(+input.value||0));
  input.addEventListener("focus",()=>input.select());
  wrap.append(dec,input,el("span",{class:"unit"},unit),inc);
  return wrap;
}

/* ---------- session lifecycle ---------- */
async function startSession(){
  if(!curGym()){ openGymSheet(); return; }
  State.activeSession={ id:uid(), gymId:State.currentGymId, date:todayISO(),
    started:false, startedAt:null, items:[] };   // build/preview first; don't auto-start logging
  await persistSession();
  render();
}
// move a built session into the active (logging) state
async function startWorkout(){
  const s=State.activeSession; if(!s) return;
  s.started=true; s.startedAt=new Date().toISOString();
  await persistSession(); render();
  toast("Workout started — let's go");
}
async function discardSession(){
  if(!confirm("Discard this workout? Nothing will be saved.")) return;
  State.activeSession=null; await setMeta("activeSession",null); render();
}
// compact, read-only exercise row for the pre-start preview
function previewRow(item){
  const ex=State.exercises.find(e=>e.id===item.exerciseId); if(!ex) return el("span");
  const grow=el("div",{class:"grow"}, exDetailName(ex),
    el("div",{class:"small muted"}, `${item.sets.length}×${ex.repMin}–${ex.repMax} · ${fmtRest(restOf(ex))} rest`));
  const t=muscleTags(ex); if(t) grow.append(t);
  return el("div",{class:"listitem",style:"cursor:default"}, grow);
}
async function persistSession(){ await setMeta("activeSession",State.activeSession); }
async function finishSession(){
  const s=State.activeSession;
  // commit session + sets that are marked done
  const done = s.items.flatMap(it=>it.sets.filter(x=>x.done&&x.reps>0).map((x,i)=>({
    id:uid(),sessionId:s.id,exerciseId:it.exerciseId,weight:+x.weight,reps:+x.reps,
    rpe:x.rpe||null,joint:!!it.joint,order:i,createdAt:new Date().toISOString()})));
  if(!done.length){
    if(!confirm("No completed sets to save. Discard this workout?")) return;
    State.activeSession=null; await setMeta("activeSession",null); render(); return;
  }
  await DB.put("sessions",{id:s.id,gymId:s.gymId,date:s.date,startedAt:s.startedAt,finishedAt:new Date().toISOString()});
  for(const st of done) await DB.put("sets",st);
  // miss-aware progression: did the logged volume hit the prescribed target? track the streak per exercise
  for(const it of s.items){
    if(it.targetVol==null) continue;                                      // no volume target (manual / bodyweight) → skip
    const ex = State.exercises.find(e=>e.id===it.exerciseId); if(!ex) continue;
    const got = it.sets.filter(x=>x.done&&x.reps>0).reduce((t,x)=>t+(+x.weight||0)*(+x.reps||0),0);
    const met = got >= it.targetVol*0.98;                                 // within 2% counts as meeting it
    const rec = await getMeta(progKey(ex)) || {streak:0};
    await setMeta(progKey(ex), {streak: met?0:(rec.streak||0)+1, date:s.date});
  }
  _exStatus=null;   // training status changed
  State.activeSession=null; await setMeta("activeSession",null);
  toast(`Saved ${done.length} sets`);
  setTab("history");
}

/* build an editable plan; suggestions are pre-filled but fully editable.
   setCount (optional) overrides how many sets to seed — used when loading a saved plan. */
async function addToPlan(ex, setCount){
  const sug=await suggestNext(ex);
  const base=sug.plan;
  const n=Math.max(1, setCount||base.length);
  State.activeSession.items.push({
    exerciseId:ex.id, kind:sug.kind, note:sug.note, joint:false, rpe:null, targetVol: sug.targetVol??null,
    last: sug.prev ? {date:sug.prev.session.date, sets:sug.prev.sets.map(s=>({weight:s.weight,reps:s.reps}))} : null,
    sets:Array.from({length:n},(_,i)=>{const p=base[Math.min(i,base.length-1)]||{weight:0,reps:ex.repMin||8};return {weight:p.weight,reps:p.reps,done:false};})
  });
  await persistSession();
}

/* ---------- plans / routines: save a workout once, repeat it in one tap ---------- */
// a plan stores the MOVEMENTS (exerciseId + set count), not frozen weights — so repeating it
// re-suggests progressed targets from your latest history.
async function savePlan(name){
  return savePlanFromItems(name, State.currentGymId, State.activeSession.items.map(it=>({exerciseId:it.exerciseId, sets:it.sets.length})));
}
async function savePlanFromItems(name, gymId, items){
  const plan={ id:uid(), gymId: gymId||State.currentGymId, name:(name||"").trim()||suggestPlanName(items),
    items, createdAt:new Date().toISOString() };
  await DB.put("plans",plan); State.plans.push(plan); return plan;
}
// turn a past session's logged sets into plan items, preserving exercise order, dropping deleted exercises
function planItemsFromSets(sets){
  const seen=new Set(), counts={}, items=[];
  sets.forEach(x=>{ counts[x.exerciseId]=(counts[x.exerciseId]||0)+1; });
  sets.slice().sort((a,b)=>(a.createdAt||"").localeCompare(b.createdAt||"")||(a.order-b.order)).forEach(x=>{
    if(!seen.has(x.exerciseId)){ seen.add(x.exerciseId); if(State.exercises.find(e=>e.id===x.exerciseId)) items.push({exerciseId:x.exerciseId, sets:counts[x.exerciseId]}); }
  });
  return items;
}
async function deletePlan(id){ await DB.del("plans",id); State.plans=State.plans.filter(p=>p.id!==id); }
async function renamePlan(plan,name){ const n=(name||"").trim(); if(!n)return; plan.name=n; await DB.put("plans",plan); State.plans=await DB.all("plans"); }
// add a plan's exercises to the current session, resolving each to this gym's equivalent.
// `unresolved` = machines that exist (at another gym) but aren't set up here yet — offer to add them.
async function applyPlanToSession(plan){
  const have=new Set(State.activeSession.items.map(i=>i.exerciseId));
  let added=0, heavier=0; const unresolved=[];
  for(const it of plan.items){
    const orig=State.exercises.find(e=>e.id===it.exerciseId);
    const ex=resolveExerciseAtGym(it.exerciseId, State.currentGymId);
    if(!ex){ if(orig) unresolved.push({ex:orig, sets:it.sets}); continue; }  // deleted → silently skip
    if(have.has(ex.id)) continue;
    await addToPlan(ex, it.sets); have.add(ex.id); added++;
    if(State.activeSession.items[State.activeSession.items.length-1]?.kind==="weight") heavier++;
  }
  return {added, heavier, unresolved};
}
async function startSessionFromPlan(plan){
  if(!curGym()){ openGymSheet(); return; }
  State.activeSession={ id:uid(), gymId:State.currentGymId, date:todayISO(), started:false, startedAt:null, items:[] };
  const {heavier,unresolved}=await applyPlanToSession(plan);
  await persistSession(); render();
  let msg=`Loaded "${plan.name}"`;
  if(heavier) msg+=` · ${heavier} lift${heavier>1?"s":""} going heavier`;
  toast(msg);
  if(unresolved.length) promptAddMissing(unresolved);
}
// machines in the plan that aren't set up at the current gym — add them here (linked, so progress pools) or skip
function promptAddMissing(list){
  openSheet("Not at this gym yet",(body,close)=>{
    const gn=curGym()?.name||"this gym";
    body.append(el("p",{class:"small muted",style:"margin-top:-6px"},
      `${list.length} exercise${list.length>1?"s aren't":" isn't"} set up at ${gn}. Add ${list.length>1?"them":"it"} here and ${list.length>1?"they'll":"it'll"} share progress with your other gym${list.length>1?"s":""} — or skip for today.`));
    list.forEach(({ex})=> body.append(el("div",{class:"listitem",style:"cursor:default"},
      el("div",{class:"grow"}, el("div",{class:"name"},ex.name),
        el("div",{class:"small muted"}, `${equipLabel(ex.equipment)||"Machine"}${ex.gymId?` · from ${gymNameOf(ex.gymId)}`:""}`)))));
    body.append(
      el("button",{class:"btn",onClick:async()=>{ const n=await addMissingToGym(list); close(); render(); toast(`Added ${n} to ${gn}`); }},ic("plus"),`Add to ${gn}`),
      el("button",{class:"btn secondary",style:"margin-top:8px",onClick:close},"Skip for now"));
  });
}
async function addMissingToGym(list){
  let n=0;
  for(const {ex,sets} of list){
    let lid=ex.linkId;                                   // link the new copy to the original so progress pools
    if(!lid){ lid=uid(); ex.linkId=lid; await DB.put("exercises",ex); }
    const copy={...ex, id:uid(), gymId:State.currentGymId, linkId:lid}; delete copy.createdAt;
    await DB.put("exercises",copy); State.exercises.push(copy);
    await addToPlan(copy, sets); n++;
  }
  await persistSession();
  return n;
}

function openSheet(title, buildBody, opts={}){
  const stacked=!!opts.stacked;                 // stacked: layer over the current sheet instead of replacing it
  const host=$("#sheetHost");
  const bg=el("div",{class:"sheet-bg"}); if(stacked) bg.style.zIndex="55";
  const close=()=>{ if(stacked){ bg.remove(); } else { host.innerHTML=""; document.body.classList.remove("modal-open"); } };
  bg.addEventListener("click",e=>{ if(e.target===bg) close(); });
  const sheet=el("div",{class:"sheet"});
  sheet.append(el("div",{class:"grabber"}));
  sheet.append(el("div",{class:"sheethead"},
    el("h2",{},title),
    el("button",{class:"sheetclose","aria-label":"Close",onClick:close}, ic("x",20))));
  buildBody(sheet, close);
  bg.append(sheet);
  if(stacked){ document.body.append(bg); }       // keep the sheet underneath (e.g. library detail over the picker)
  else { host.innerHTML=""; host.append(bg); document.body.classList.add("modal-open"); }
  adjustOpenSheets();
}
// Keep an open bottom sheet above the iOS software keyboard. Focusing an input shrinks the
// visual viewport; a position:fixed sheet can't be scrolled by iOS to clear the keyboard, so
// without this the keyboard (and its ^ v Done bar) covers the field and the layout looks broken.
function adjustOpenSheets(){
  const vv=(typeof window!=="undefined") && window.visualViewport; if(!vv) return;
  const overlap=Math.max(0, Math.round(window.innerHeight - vv.height - vv.offsetTop)); // keyboard height (0 when hidden)
  document.querySelectorAll(".sheet-bg .sheet").forEach(sheet=>{
    sheet.style.marginBottom = overlap>0 ? overlap+"px" : "";          // float above the keyboard
    sheet.style.maxHeight    = overlap>0 ? (Math.round(vv.height)-8)+"px" : ""; // shrink to fit; else CSS 88vh
  });
}
if(typeof window!=="undefined" && window.visualViewport){
  visualViewport.addEventListener("resize", adjustOpenSheets);
  visualViewport.addEventListener("scroll", adjustOpenSheets);
}
