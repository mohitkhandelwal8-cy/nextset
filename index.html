/* exercise (machine) add/edit */
function muscleSelect(value, includeNone){
  const sel=document.createElement("select");
  if(includeNone){ const o=document.createElement("option"); o.value=""; o.textContent="None"; sel.append(o); }
  REGION_ORDER.forEach(region=>{
    const keys=Object.keys(MUSCLES).filter(k=>MUSCLES[k].region===region);
    if(!keys.length)return;
    const og=document.createElement("optgroup"); og.label=region;
    keys.forEach(k=>{ const o=document.createElement("option"); o.value=k; o.textContent=MUSCLES[k].label; og.append(o); });
    sel.append(og);
  });
  sel.value=value||"";
  return sel;
}
function equipSelect(value){
  const sel=document.createElement("select");
  EQUIP_ORDER.forEach(k=>{ const o=document.createElement("option"); o.value=k; o.textContent=EQUIP[k].label; sel.append(o); });
  sel.value=value||"machine";
  return sel;
}
const REST_OPTS=[30,45,60,75,90,120,150,180,240,300];
function restSelect(value){
  const sel=document.createElement("select");
  REST_OPTS.forEach(s=>{ const o=document.createElement("option"); o.value=s; o.textContent=fmtRest(s); sel.append(o); });
  // snap to the nearest preset if the value isn't already one
  const snapped=REST_OPTS.includes(+value)?+value:REST_OPTS.reduce((a,b)=>Math.abs(b-value)<Math.abs(a-value)?b:a,REST_OPTS[0]);
  sel.value=String(snapped);
  return sel;
}
// togglable gym chips for a machine's "available at"; lockedSet = gyms already in the group (can't remove here)
function gymMultiSelect(preChecked, lockedSet, onChange){
  const checked=new Set(preChecked);
  const wrap=el("div",{class:"filterchips",style:"flex-wrap:wrap"});
  State.gyms.forEach(g=>{
    const locked=lockedSet&&lockedSet.has(g.id);
    const chip=el("button",{type:"button",class:"fchip"+(checked.has(g.id)?" on":"")}, g.name);
    if(locked){ chip.disabled=true; chip.style.opacity="0.8"; }
    else chip.addEventListener("click",()=>{ checked.has(g.id)?checked.delete(g.id):checked.add(g.id); chip.classList.toggle("on"); onChange&&onChange(); });
    wrap.append(chip);
  });
  return {wrap, get:()=>[...checked]};
}

// parser: "<name> <weight> [x] <r1>[, <r2> ...]"
function parseNL(str){
  if(!str) return null;
  const s=str.trim().replace(/\s+/g," ");
  const m=s.match(/^([a-zA-Z][a-zA-Z\s\-/]*?)\s+(\d+(?:\.\d+)?)\s*(?:x|×|@|for)?\s*([\d,\s]+)$/i);
  if(!m) return null;
  const name=m[1].trim().replace(/\b\w/g,c=>c.toUpperCase());
  const weight=+m[2];
  const reps=m[3].split(/[,\s]+/).map(Number).filter(n=>n>0);
  if(!reps.length) return null;
  return {name,sets:reps.map(r=>({weight,reps:r}))};
}

/* ---------- INSIGHTS ---------- */
// week bucket = the Monday of that date (local noon dodges TZ/DST slip)
function mondayOf(iso){ const d=new Date(iso+"T12:00:00"); d.setDate(d.getDate()-((d.getDay()+6)%7)); return d.toISOString().slice(0,10); }
function lastNWeeks(n){ const d=new Date(); d.setHours(12,0,0,0); d.setDate(d.getDate()-((d.getDay()+6)%7)); const out=[]; for(let i=n-1;i>=0;i--){ const w=new Date(d); w.setDate(d.getDate()-i*7); out.push(w.toISOString().slice(0,10)); } return out; }
function weekStreak(weekSet){ const d=new Date(); d.setHours(12,0,0,0); d.setDate(d.getDate()-((d.getDay()+6)%7)); let cur=new Date(d); if(!weekSet.has(cur.toISOString().slice(0,10))) cur.setDate(cur.getDate()-7); let s=0; while(weekSet.has(cur.toISOString().slice(0,10))){ s++; cur.setDate(cur.getDate()-7); } return s; }
function fmtWeekLbl(iso){ const d=new Date(iso+"T12:00:00"); return (d.getMonth()+1)+"/"+d.getDate(); }
// Progressive-overload score (1–10) over the last 28 days. Blends three things, like composite
// indices in other apps (e.g. Jefit's NSPI): how much of your training is moving up (quality),
// how consistently you trained (weeks active), and how big the gains are (magnitude).
// Lifts are pooled by linkId and need ≥2 sessions in the window to count.
function overloadScore(sessions, sets){
  const sesById=Object.fromEntries(sessions.map(s=>[s.id,s])); const unit={}; const weeks=new Set();
  for(const x of sets){ const ex=State.exercises.find(e=>e.id===x.exerciseId); if(!ex)continue;
    const se=sesById[x.sessionId]; if(!se||daysAgo(se.date)>28)continue;
    weeks.add(mondayOf(se.date));
    const key=ex.linkId||ex.id, m=isBW(ex)?x.reps:epley(x.weight,x.reps);
    (unit[key]=unit[key]||{})[se.date]=Math.max(unit[key][se.date]||0, m); }
  let up=0,hold=0,down=0; const gains=[];
  for(const k in unit){ const ks=Object.keys(unit[k]).sort(); if(ks.length<2)continue;
    const f=unit[k][ks[0]], l=unit[k][ks[ks.length-1]], dd=f>0?(l-f)/f:0;
    if(dd>0.01)up++; else if(dd<-0.01)down++; else hold++; gains.push(dd); }
  const tracked=up+hold+down;
  if(!tracked) return { score:null, label:"Keep logging", up:0, hold:0, down:0, tracked:0, weeks:Math.min(weeks.size,4), avgGainPct:0 };
  const quality=(up+0.5*hold)/tracked;                    // share moving up (0–1)
  const consistency=Math.min(weeks.size,4)/4;             // weeks trained of last 4 (0–1)
  const avgGain=gains.reduce((a,b)=>a+b,0)/gains.length;  // mean fractional change
  const magnitude=Math.max(0, Math.min(1, avgGain/0.08)); // ~8% over 4 wks = full marks
  const raw=0.5*quality + 0.3*consistency + 0.2*magnitude;
  const score=Math.max(1, Math.min(10, Math.round(raw*10)));
  return { score, up, hold, down, tracked, weeks:Math.min(weeks.size,4), avgGainPct:Math.round(avgGain*100),
    label: score>=8?"Excellent": score>=6?"Progressing": score>=4?"Holding":"Stalling" };
}
function statTile(num,label,tone){ return el("div",{class:"stat"+(tone?" "+tone:"")}, el("div",{class:"num"},String(num)), el("div",{class:"lbl"},label)); }

    const regionsWithMachines=new Set(State.exercises.map(e=>exRegion(e)));

    }
    if(!alertCount) alerts.append(el("div",{class:"insight good"},el("div",{class:"t"},"All clear"),
      el("div",{class:"d"},"No plateaus or flags right now. Keep stacking sessions.")));
    mount.append(alerts);

function sparkline(series,label=""){
  const w=320,h=54,pad=4;
  const min=Math.min(...series),max=Math.max(...series),rng=(max-min)||1;
  const pts=series.map((v,i)=>{
    const x=pad+(series.length<2?w-2*pad:i/(series.length-1)*(w-2*pad));
    const y=h-pad-((v-min)/rng)*(h-2*pad); return `${x.toFixed(1)},${y.toFixed(1)}`;});
  const wrap=el("div",{class:"sparkwrap",role:"img","aria-label":label||"Progress trend"});
  wrap.innerHTML=`<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:100%">
    <polyline fill="none" stroke="var(--accent)" stroke-width="2" points="${pts.join(" ")}"/>
    ${pts.length?`<circle cx="${pts[pts.length-1].split(",")[0]}" cy="${pts[pts.length-1].split(",")[1]}" r="3" fill="var(--accent)"/>`:""}
  </svg>`;
  return wrap;
}

// a filled line chart (SVG, responsive). values = numbers; opts.labels = x-axis labels
function lineChart(values, opts={}){
  const {labels=[], fmt=(v=>String(Math.round(v)))}=opts;
  const n=values.length, W=324,H=132,padL=6,padR=6,padT=14,padB=18;
  if(!n || values.every(v=>!v)) return el("div",{class:"tiny muted",style:"padding:20px 0;text-align:center"},"Not enough data yet — keep logging.");
  const max=Math.max(...values), min=Math.min(...values,0), rng=(max-min)||1;
  const X=i=> padL + (n<2?(W-padL-padR)/2 : i/(n-1)*(W-padL-padR));
  const Y=v=> padT + (1-(v-min)/rng)*(H-padT-padB);
  const line=values.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
  const li=n-1, base=(H-padB).toFixed(1);
  const fillPts=`${X(0).toFixed(1)},${base} ${line} ${X(li).toFixed(1)},${base}`;
  let xl=""; if(labels.length===n){ [0,Math.floor(li/2),li].forEach(i=>{ const a=i===0?"start":i===li?"end":"middle"; xl+=`<text x="${X(i).toFixed(1)}" y="${H-5}" fill="var(--muted)" font-size="9" text-anchor="${a}">${esc(labels[i])}</text>`; }); }
  const wrap=el("div",{class:"chart",role:"img","aria-label":"Trend chart"});
  wrap.innerHTML=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
    <line x1="${padL}" y1="${base}" x2="${W-padR}" y2="${base}" stroke="var(--line)"/>
    <polygon points="${fillPts}" fill="var(--accent)" opacity="0.10"/>
    <polyline points="${line}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${X(li).toFixed(1)}" cy="${Y(values[li]).toFixed(1)}" r="3.5" fill="var(--accent)"/>
    <text x="${padL}" y="${(padT-3).toFixed(1)}" fill="var(--muted)" font-size="9">${esc(fmt(max))}</text>
    ${xl}
  </svg>`;
  return wrap;
}
// drill-down for one muscle: weekly sets/volume, focus %, overload, top exercises, tips
function openMuscleDetail(mk){

    (async()=>{

      const WK=lastNWeeks(10);
      const wkSets=Object.fromEntries(WK.map(k=>[k,0])), wkTon=Object.fromEntries(WK.map(k=>[k,0]));
      const recentEx={}; let allSetsThisWeek=0;

        if(recent) allSetsThisWeek++;

      const setsThis=wkSets[thisWeek]||0, setsLast=wkSets[lastWeek]||0, tonThis=Math.round(wkTon[thisWeek]||0);
      const focus= allSetsThisWeek? Math.round(100*setsThis/allSetsThisWeek):0;

      const grid=el("div",{class:"statgrid"});

      mount.append(grid);

      const deltaPct = setsLast? Math.round((setsThis-setsLast)/setsLast*100):null;
      mount.append(el("div",{class:"row between",style:"margin:16px 0 0"},
        el("div",{style:"font-weight:600;font-size:14px"},"Weekly sets"),

      mount.append(lineChart(WK.map(k=>wkSets[k]), {labels:WK.map(fmtWeekLbl), fmt:v=>v%1?v.toFixed(1):Math.round(v)+""}));

      const tops=Object.entries(recentEx).sort((a,b)=>b[1]-a[1]).slice(0,6);
      if(tops.length){
        mount.append(el("div",{style:"font-weight:600;font-size:14px;margin:16px 0 6px"},"Top exercises · this week"));
        const vmax=Math.max(...tops.map(t=>t[1]));

          mount.append(el("button",{class:"vbar tappable",onClick:()=>openExerciseProgress(id)}, el("div",{class:"lbl"},ex.name),
            el("div",{class:"track"}, el("div",{class:"fill",style:`width:${Math.round(v/vmax*100)}%`})),

      }

      const tips=[];
      if(setsThis===0) tips.push(["warn",`No volume this week`,`Slot in a couple of ${(muscleLabel(mk)||mk).toLowerCase()} sets to keep it progressing.`]);
      else if(setsThis<6) tips.push(["warn","Low volume","Most lifters grow on ~10–20 hard sets per muscle per week — this is below maintenance."]);
      else if(setsThis<=20) tips.push(["good","In the growth range","~10–20 sets per week is the sweet spot for most people."]);
      else tips.push(["warn","Very high volume","Above ~20 sets/week — make sure you're recovering, not just accumulating."]);
      if(ov.tracked>=1){ if(ov.score>=7) tips.push(["good","Progressing","Loads and reps here are trending up."]);

      mount.append(el("div",{class:"divider"}));

    })();

let insightsRange="12w";
// committed sets for an exercise (pooled across linked machines), each stamped with its session date
async function exerciseHistory(exId){
  let sets=[]; for(const id of linkedIds(exId)) sets=sets.concat(await DB.byIndex("sets","exerciseId",id));
  const by=Object.fromEntries((await DB.all("sessions")).map(s=>[s.id,s]));
  return sets.filter(s=>by[s.sessionId]).map(s=>({...s,date:by[s.sessionId].date})).sort((a,b)=>a.date.localeCompare(b.date));
}
function computePRs(sets, ex){
  const bw=isBW(ex); let heaviest=0,best1rm=0,bestSetVol=0,maxReps=0; const repMax={},bySession={};
  for(const s of sets){ if(!(s.reps>0))continue; const w=+s.weight||0;
    heaviest=Math.max(heaviest,w); maxReps=Math.max(maxReps,s.reps);
    if(!bw) best1rm=Math.max(best1rm,epley(w,s.reps));
    bestSetVol=Math.max(bestSetVol,w*s.reps);
    if(!repMax[s.reps]||w>repMax[s.reps]) repMax[s.reps]=w;
    bySession[s.sessionId]=(bySession[s.sessionId]||0)+w*s.reps; }
  return {heaviest,best1rm:Math.round(best1rm),bestSetVol:Math.round(bestSetVol),
    bestSessionVol:Math.round(Math.max(0,...Object.values(bySession),0)),maxReps,repMax,bw};
}
// returns a PR message if (weight,reps) beats committed history for this exercise, else null
async function prCheck(ex,weight,reps){
  if(!ex||!(reps>0))return null; const hist=await exerciseHistory(ex.id); if(!hist.length)return null;
  const pr=computePRs(hist,ex);
  if(isBW(ex)) return reps>pr.maxReps? `New PR · ${reps} reps on ${ex.name}` : null;
  if(epley(weight,reps)>pr.best1rm) return `New PR · best est. 1RM on ${ex.name}`;
  if(weight>pr.heaviest) return `New PR · heaviest ${ex.name} (${weight}${ex.unit||"kg"})`;
  return null;
}

// ranged training-volume series (weekly for 12w, monthly for longer)
function lastNMonths(n){ const d=new Date(); d.setDate(15); const out=[]; for(let i=n-1;i>=0;i--){ const m=new Date(d); m.setMonth(d.getMonth()-i); out.push(m.toISOString().slice(0,7)); } return out; }
function fmtMonthLbl(ym){ return ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+ym.split("-")[1]-1]; }
function volumeSeries(allSets, dateOf, range){
  if(range==="12w"){ const WK=lastNWeeks(12), m=Object.fromEntries(WK.map(k=>[k,0]));
    for(const x of allSets){ const d=dateOf(x); if(d){const k=mondayOf(d); if(k in m)m[k]++;} }
    return {vals:WK.map(k=>m[k]), labels:WK.map(fmtWeekLbl), caption:"Working sets per week · last 12 weeks", unit:"wk"}; }
  let months;
  if(range==="6mo") months=lastNMonths(6); else if(range==="1yr") months=lastNMonths(12);
  else { const ds=allSets.map(dateOf).filter(Boolean).sort(); if(!ds.length) return {vals:[],labels:[],caption:"",unit:"mo"};
    const f=ds[0], now=new Date(); let c=(now.getFullYear()-+f.slice(0,4))*12+(now.getMonth()-(+f.slice(5,7)-1))+1; months=lastNMonths(Math.min(Math.max(c,1),36)); }
  const m=Object.fromEntries(months.map(k=>[k,0]));
  for(const x of allSets){ const d=dateOf(x); if(d){const k=d.slice(0,7); if(k in m)m[k]++;} }
  return {vals:months.map(k=>m[k]), labels:months.map(fmtMonthLbl), unit:"mo",
    caption:`Working sets per month · ${range==="6mo"?"last 6 months":range==="1yr"?"last 12 months":"all time"}`};
}

/* ---------- exercise library (free-exercise-db, public domain / Unlicense) ----------
   Bundled as exercise-library.json (~750 load-trackable exercises). The library's raw
   muscle/equipment vocabulary is mapped onto NextSet's taxonomy here: the region comes
   from the library (authoritative), and within-region specificity is refined by our own
   name rules (so "Side Lateral Raise" → Side Delts, not a generic "shoulders"). */
const LIB_MUSCLE={                 // free-exercise-db muscle -> NextSet muscle key (region preserved)
  abdominals:"core", abductors:"glutes", adductors:"quads", biceps:"biceps", calves:"calves",
  chest:"chest", forearms:"forearms", glutes:"glutes", hamstrings:"hamstrings", lats:"lats",
  "lower back":"lower_back", "middle back":"upper_back", neck:"upper_back", quadriceps:"quads",
  shoulders:"front_delts", traps:"upper_back", triceps:"triceps",
};
const LIB_EQUIP={                  // free-exercise-db equipment -> NextSet equipment key
  "body only":"bodyweight", machine:"machine", barbell:"barbell", dumbbell:"dumbbell", cable:"cable",
  kettlebells:"kettlebell", bands:"other", "medicine ball":"other", "exercise ball":"bodyweight",
  "foam roll":"other", "e-z curl bar":"barbell",
};
const mapLibMuscle = m => LIB_MUSCLE[m] || null;
function libEquip(le, name){
  let eq = LIB_EQUIP[le] || guessEquipment(name);                   // null/unknown -> detect from name
  if(eq==="machine" && guessEquipment(name)==="plate") eq="plate";  // hack squat / t-bar / landmine etc.
  return eq;
}
// turn a raw library record into {name, equipment, primary, secondary} in NextSet's vocabulary
function libToExercise(le){
  const mP = (le.primaryMuscles&&le.primaryMuscles.length)   ? mapLibMuscle(le.primaryMuscles[0])   : null;
  const mS = (le.secondaryMuscles&&le.secondaryMuscles.length)? mapLibMuscle(le.secondaryMuscles[0]) : null;
  const g = guessMuscles(le.name);
  let primary;
  if(mP) primary = (g.primary && regionOf(g.primary)===regionOf(mP)) ? g.primary : mP;  // refine within region only
  else   primary = g.primary || null;
  let secondary = mS || g.secondary || null;
  if(secondary===primary) secondary=null;
  return {name:le.name, equipment:libEquip(le.equipment, le.name), primary, secondary};
}
// already in the user's collection? (scoped equip -> current gym; free weights -> global)
function libAlreadyAdded(le){
  const m=libToExercise(le), scoped=equipGymScoped(m.equipment), t=normName(m.name);
  return State.exercises.some(e=> normName(e.name)===t && (scoped ? e.gymId===State.currentGymId : e.gymId==null));
}
// create + persist a NextSet exercise from a library record
async function addLibraryExercise(le){
  const m=libToExercise(le), equipment=m.equipment;
  const rec={ id:uid(), gymId: equipGymScoped(equipment)?State.currentGymId:null, name:m.name, libId:le.id,
    unit:"kg", increment:EQUIP[equipment].inc, sets:3, repMin:8, repMax:12,
    primary:m.primary, secondary:m.secondary, equipment,
    restSec:suggestRest({name:m.name, repMax:12, primary:m.primary}), notes:"" };

}
// lazy-load + cache the bundled catalog, enriched with NextSet mapping for display/filtering
let LIB=null;
async function loadLibrary(){
  if(LIB) return LIB;
  const res = await fetch("./exercise-library.json");
  if(!res.ok) throw new Error("HTTP "+res.status);
  const raw = await res.json();
  LIB = raw.map(le=>{ const m=libToExercise(le);
    return { raw:le, name:le.name, equipment:m.equipment, primary:m.primary, secondary:m.secondary,
             region: m.primary? regionOf(m.primary) : "Other" }; })
    .sort((a,b)=> a.name.localeCompare(b.name));
  return LIB;
}

// best-guess library match for an unlinked exercise (token overlap + equipment), as a SUGGESTION the user confirms
function guessLibMatch(ex){
  if(!LIB || !ex) return null;
  const t=normName(ex.name); if(!t) return null;
  const toks=t.split(" ").filter(w=>w.length>2); if(!toks.length) return null;
  let best=null, bestScore=-1;
  for(const e of LIB){
    const nt=new Set(normName(e.name).split(" "));
    const overlap=toks.filter(w=>nt.has(w)).length; if(!overlap) continue;
    let score = overlap/toks.length;                       // fraction of the user's words found
    if(e.equipment===ex.equipment) score += 0.15;          // prefer the same equipment family
    score -= normName(e.name).split(" ").length*0.01;      // mild nudge toward the simpler name
    if(score>bestScore){ bestScore=score; best=e; }
  }
  return bestScore>=0.6 ? best : null;                      // only suggest a reasonably strong match
}

      else {

        const all=q.split(" ").filter(w=>w.length>1), sig=all.filter(w=>!STOP.has(w)), use=sig.length?sig:all;
        list=LIB.map(e=>{ const nt=normName(e.name).split(" ");

// CTA shown in the detail when an exercise isn't linked to the library yet
function libLinkCta(ex, closeDetail){

  if(guess){
    card.append(el("button",{class:"btn",style:"width:100%",onClick:async()=>{ await linkExerciseToLib(ex, guess.raw.id); closeDetail(); openExerciseProgress(ex.id); }}, ic("check",16), `Use “${guess.name}”`));
    card.append(el("button",{class:"btn secondary",style:"width:100%;margin-top:8px",onClick:()=>openLibraryLink(ex)}, ic("search",16), "Pick a different one"));
  } else {
    card.append(el("button",{class:"btn",style:"width:100%",onClick:()=>openLibraryLink(ex)}, ic("search",16), "Find in library"));
  }
  return card;
}
function openLibrarySheet(){
  openSheet("Exercise library",(body,close)=>{
    const gymName = curGym()?curGym().name:"your collection";
    body.append(el("p",{class:"small muted",style:"margin:-6px 0 10px"},
      "Tap Add — machines & cables go to ", el("b",{},gymName),
      ", free-weight moves are shared across all your gyms."));
    const search=el("input",{type:"text",placeholder:"Search exercises…","aria-label":"Search exercises"});
    body.append(el("div",{style:"margin-bottom:8px"}, search));
    let region=null, chips=[];
    const chipRow=el("div",{class:"filterchips"});
    const results=el("div",{});
    const note=el("div",{class:"tiny muted",style:"margin:8px 2px"});
    function buildChips(){ chipRow.innerHTML=""; chips=[];
      [["All",null],...REGION_ORDER.map(r=>[r,r])].forEach(([label,val])=>{
        const b=el("button",{class:"fchip"+(region===val?" on":""),onClick:()=>{region=val;chips.forEach(([c,v])=>c.classList.toggle("on",region===v));renderResults();}},label);
        chips.push([b,val]); chipRow.append(b);
      });
    }
    const CAP=60;
    function libRow(e){
      const open=()=>openLibraryDetail(e);
      const thumb=el("div",{class:"exthumb"}, ic("dumbbell",18));
      const timg=document.createElement("img"); timg.src=libImageUrl(e.raw.id,0); timg.loading="lazy"; timg.alt="";
      timg.onerror=()=>timg.remove(); thumb.append(timg);
      const grow=el("div",{class:"grow"},
        el("div",{class:"name"},e.name),
        el("div",{class:"small muted"}, equipLabel(e.equipment)||"Other"));
      const tags=[];
      if(e.primary&&muscleLabel(e.primary)) tags.push(muscleTag(muscleLabel(e.primary),regionOf(e.primary),true));
      if(e.secondary&&muscleLabel(e.secondary)) tags.push(muscleTag(muscleLabel(e.secondary),regionOf(e.secondary),false));
      if(tags.length) grow.append(el("div",{class:"mtags"},...tags));
      const slot=el("div",{style:"flex:none"});
      const paint=()=>{ slot.innerHTML="";
        if(libAlreadyAdded(e.raw)) slot.append(el("span",{class:"tiny muted",style:"display:inline-flex;align-items:center;gap:4px;white-space:nowrap"}, ic("check",15),"Added"));
        else slot.append(el("button",{class:"chip add",style:"min-height:40px","aria-label":`Add ${e.name}`,onClick:async(ev)=>{ ev.stopPropagation(); await addLibraryExercise(e.raw); toast(`Added ${e.name}`); paint(); render(); }}, ic("plus",15),"Add"));
      };
      paint();
      return el("div",{class:"listitem",role:"button",tabindex:"0","aria-label":`View ${e.name}`,style:"cursor:pointer;gap:10px",
        onClick:open, onKeydown:ev=>{if(ev.key==="Enter"||ev.key===" "){ev.preventDefault();open();}}}, thumb, grow, slot);
    }
    function renderResults(){
      results.innerHTML="";
      if(!LIB){ results.append(el("p",{class:"muted small"},"Loading…")); note.textContent=""; return; }
      const q=normName(search.value);
      let list=LIB;
      if(region) list=list.filter(e=>e.region===region);
      if(q) list=list.filter(e=>normName(e.name).includes(q));
      if(!list.length){ results.append(el("p",{class:"muted small"},"No matches. Try a different search, or use “Add your own” to create it.")); note.textContent=""; return; }
      list.slice(0,CAP).forEach(e=>results.append(libRow(e)));
      note.textContent = list.length>CAP ? `Showing ${CAP} of ${list.length} — keep typing to narrow.` : `${list.length} exercise${list.length>1?"s":""}`;
    }
    buildChips(); body.append(chipRow, results, note);
    search.addEventListener("input", renderResults);
    renderResults();
    loadLibrary().then(()=>renderResults()).catch(err=>{
      results.innerHTML=""; results.append(el("p",{class:"muted small"},
        "Couldn't load the library ("+(err.message||err)+"). If this is your first use offline, reconnect once and it'll cache for next time."));
    });
  });
}

/* ---------- MORE (machines mgmt, export, about) ---------- */
function viewMore(){
  const wrap=el("div",{});

    const chips=el("div",{class:"filterchips",style:"flex-wrap:wrap"});

      chips.append(el("button",{class:"fchip",style:cur?tintStyle(h,600):"","aria-pressed":cur?"true":"false",onClick:async()=>{ State.currentGymId=g.id; await setMeta("currentGymId",g.id); render(); }},
        el("span",{class:"gdot",style:`background:${h};margin-right:7px`}), g.name)); });
    gymCard.append(chips);
  }
  gymCard.append(el("button",{class:"btn secondary",style:"margin-top:8px",onClick:openGymSheet},ic("plus"),"Manage gyms"));
  wrap.append(gymCard);
  // ----- saved plans (routines) -----
  const plansCard=el("div",{class:"card"});

    el("p",{class:"small muted",style:"margin:-6px 0 10px"},"Reusable workouts you can start in one tap. Tap to edit."));
  const plans=allPlans();
  plans.forEach(p=>{
    const n=p.items.length, regs=planRegions(p);
    plansCard.append(el("div",{class:"listitem",role:"button",tabindex:"0",style:"cursor:pointer","aria-label":`Edit ${p.name}`,

        el("div",{class:"small muted"}, n? `${n} exercise${n>1?"s":""}${regs.length?" · "+regs.slice(0,2).join(", "):""} · ~${templateMinutes(p)} min` : "Empty — tap to add exercises")),
      el("span",{class:"chev"},ic("chevron",18))));

  if(!plans.length) plansCard.append(el("p",{class:"muted small",style:"margin:0 0 10px"},"No plans yet. Build one here, or save a workout as a plan while you train."));

  wrap.append(plansCard);
  // ----- Exercises, grouped by gym (collapsed) + add -----
  const exCard=el("div",{class:"card"}); exCard.append(el("h2",{},"Exercises"));
  const groups=State.gyms.map(g=>({name:g.name, hue:gymHue(g.id), list:State.exercises.filter(e=>e.gymId===g.id)}));
  const globals=State.exercises.filter(e=>e.gymId==null);
  if(globals.length||!State.gyms.length) groups.push({name:"Free weights & bodyweight", hue:"#9FB0C3", list:globals, global:true});
  groups.forEach(grp=>{
    const det=el("details",{class:"exgroup"});
    det.append(el("summary",{},
      el("span",{class:"gdot",style:`background:${grp.hue}`}),
      el("span",{class:"grow",style:"font-weight:600"}, grp.name),
      el("span",{class:"tiny muted"}, String(grp.list.length)),
      el("span",{class:"chev"},ic("chevron",16))));
    if(grp.list.length) grp.list.forEach(ex=>det.append(exerciseCard(ex)));
    else det.append(el("p",{class:"muted small",style:"margin:6px 2px 10px"}, grp.global?"No free-weight exercises yet.":"No machines added at this gym yet."));
    exCard.append(det);
  });
  exCard.append(
    el("button",{class:"btn secondary",style:"margin-top:12px",onClick:openLibrarySheet},ic("search"),"Browse exercise library"),
    el("button",{class:"btn secondary",style:"margin-top:8px",onClick:()=>openExerciseSheet(null)},ic("plus"),"Add your own"));
  wrap.append(exCard);
  // ----- Appearance: theme toggle -----
  const themeCard=el("div",{class:"card"}); themeCard.append(el("h2",{},"Appearance"));
  const cur=getTheme(), seg=el("div",{class:"seg"});
  [["system","System"],["light","Light"],["dark","Dark"]].forEach(([k,lbl])=>
    seg.append(el("button",{class:"segbtn"+(cur===k?" on":""),"aria-pressed":cur===k?"true":"false",onClick:()=>setTheme(k)}, lbl)));
  themeCard.append(seg, el("div",{class:"tiny muted",style:"margin-top:8px"},"Dark by default · System follows your phone."));
  wrap.append(themeCard);
  // ----- Progression: volume-increase target -----
  const progCard=el("div",{class:"card"});
  progCard.append(el("h2",{},"Progression"),
    el("p",{class:"small muted",style:"margin:-6px 0 12px"},"Each time you repeat an exercise, suggestions aim to beat your last session's total volume (weight × reps) by this much. Heavier sets roll in one at a time as you top out your rep range. Fall short and it holds the same target — keep at it until you hit it, then it climbs again."));
  const vInp=el("input",{type:"number",inputMode:"numeric",min:"1",max:"25",step:"1",value:String(volTarget()),

  const saveVol=async()=>{ let v=Math.round(+vInp.value); if(!Number.isFinite(v)||v<=0) v=4; v=Math.max(1,Math.min(25,v)); vInp.value=String(v); State.volTargetPct=v; await setMeta("volTargetPct",v); toast(`Targeting +${v}% volume each session`); };
  vInp.addEventListener("change",saveVol); vInp.addEventListener("blur",saveVol);
  progCard.append(el("div",{class:"row",style:"gap:10px;align-items:center"},

    el("h2",{},"Your data"),

  ));
  wrap.append(el("div",{class:"card"},
    el("h2",{},"About"),

      "NextSet · local-first workout tracker. Suggestions target a small volume increase each session (set it under Progression), from your own history. Add to Home Screen to use it like an app."),
    el("button",{class:"btn secondary",style:"margin-top:10px",onClick:checkForUpdates},ic("download"),"Check for updates"),
    el("p",{class:"tiny muted",style:"margin:8px 0 0"}, `Version ${APP_VERSION}`)
  ));
  return wrap;
}

async function exportData(kind){
  const [gyms,exercises,sessions,sets]=await Promise.all(
    ["gyms","exercises","sessions","sets"].map(s=>DB.all(s)));
  let blob,fname;
  if(kind==="json"){
    blob=new Blob([JSON.stringify({gyms,exercises,sessions,sets},null,2)],{type:"application/json"});
    fname="nextset-export.json";
  } else {
    const exName=id=>exercises.find(e=>e.id===id)?.name||"";
    const gName=id=>gyms.find(g=>g.id===id)?.name||"";
    const sesById=Object.fromEntries(sessions.map(s=>[s.id,s]));
    const rows=[["date","gym","exercise","set","weight","reps","rpe","joint"]];
    sets.sort((a,b)=>{const A=sesById[a.sessionId],B=sesById[b.sessionId];
      return ((B?.date||"")+'').localeCompare((A?.date||""))||a.order-b.order;});
    sets.forEach(x=>{const se=sesById[x.sessionId];
      rows.push([se?.date||"",gName(se?.gymId),exName(x.exerciseId),x.order+1,x.weight,x.reps,x.rpe||"",x.joint?"yes":""]);});
    blob=new Blob([rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n")],{type:"text/csv"});
    fname="nextset-sets.csv";
  }
  const url=URL.createObjectURL(blob);
  const a=el("a",{href:url,download:fname}); document.body.append(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast("Exported "+fname);
}

/* ---------- wire up + boot ---------- */
document.querySelectorAll(".tabbar button").forEach(b=>b.addEventListener("click",()=>setTab(b.dataset.tab)));

let swUpdateTriggered=false;
function showUpdateBanner(reg){
  if(document.getElementById("updateBar")) return;
  const bar=el("div",{class:"updatebar",id:"updateBar"},
    el("div",{class:"t"},"New version available"),
    el("button",{onClick:()=>{ swUpdateTriggered=true; const w=reg.waiting||reg.installing; if(w) w.postMessage("SKIP_WAITING"); bar.remove(); }},"Update"));
  document.body.append(bar);
}
// manual escape hatch — forces a fresh network check for sw.js and applies any new version
async function checkForUpdates(){
  if(!("serviceWorker" in navigator) || !location.protocol.startsWith("http")){ toast("Updates aren't available here"); return; }
  const reg = await navigator.serviceWorker.getRegistration();
  if(!reg){ toast("Reopen the app to enable updates"); return; }
  toast("Checking for updates…");
  try{ await reg.update(); }catch(e){}
  const apply=()=>{ if(reg.waiting){ swUpdateTriggered=true; reg.waiting.postMessage("SKIP_WAITING"); toast("Updating…"); return true; } return false; };
  if(apply()) return;
  if(reg.installing){ toast("Downloading new version…"); reg.installing.addEventListener("statechange",()=>apply()); return; }
  toast(`You're on the latest (${APP_VERSION})`);
}

(async function boot(){
  applyTheme();
  try{ if(window.matchMedia) matchMedia("(prefers-color-scheme: light)").addEventListener("change",()=>{ if(getTheme()==="system"){ applyTheme(); render(); } }); }catch(e){}
  try{ await DB.open(); await loadState(); render(); }
  catch(e){ $("#view").innerHTML="<div class='empty'><div class='big'><svg viewBox='0 0 24 24' width='42' height='42' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z'/><path d='M12 9v4'/><path d='M12 17h.01'/></svg></div><p>Couldn't open local storage.</p><p class='muted small'>"+esc(e.message||e)+"</p></div>"; }
  if("serviceWorker" in navigator && location.protocol.startsWith("http")){
    // updateViaCache:"none" → the sw.js script is never served from the HTTP cache on update
    // checks, so a new deploy is detected immediately (iOS caches it for 10 min otherwise).
    navigator.serviceWorker.register("sw.js", {updateViaCache:"none"}).then(reg=>{
      reg.update().catch(()=>{});   // force a check on every launch (iOS often skips the automatic one)
      if(reg.waiting && navigator.serviceWorker.controller) showUpdateBanner(reg);
      reg.addEventListener("updatefound",()=>{
        const nw=reg.installing; if(!nw) return;
        nw.addEventListener("statechange",()=>{
          if(nw.state==="installed" && navigator.serviceWorker.controller) showUpdateBanner(reg);
        });
      });
    }).catch(()=>{});
    let refreshing=false;
    navigator.serviceWorker.addEventListener("controllerchange",()=>{
      if(swUpdateTriggered && !refreshing){ refreshing=true; location.reload(); }
    });
    // re-check whenever the app is brought back to the foreground — a home-screen PWA resumed
    // from memory never re-navigates, so this is often the only time iOS will see a new version.
    document.addEventListener("visibilitychange",()=>{
      if(document.visibilityState==="visible") navigator.serviceWorker.getRegistration().then(r=>r&&r.update()).catch(()=>{});
    });
  }
})();
